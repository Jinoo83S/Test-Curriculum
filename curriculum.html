<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0F1F5C;--nv2:#1B2F7A;--nv3:#2C4099;
  --gd2:#E8B020;--gd3:#FBD155;
  --bg:#F0F2F8;--wh:#fff;--tx:#111827;--sb:#5B6888;--bd:#D8DDED;
  --gn:#15803D;--gnb:#DCFCE7;--rd:#DC2626;--rdb:#FEF2F2;
  --yl:#B45309;--ylb:#FFFBEB;
  --r:8px;--sh:0 1px 8px rgba(15,31,92,.07);--shh:0 4px 18px rgba(15,31,92,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none}
input,select,textarea{font-family:inherit}

/* ── 토스트 ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:#fff;padding:9px 20px;border-radius:30px;font-size:13px;font-weight:600;white-space:nowrap;max-width:90vw;z-index:10000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,.22)}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--gn)}
#toast.err{background:var(--rd)}
#toast.warn{background:var(--yl)}

/* ── 로그인 화면 ── */
#login-screen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(150deg,var(--nv) 0%,var(--nv2) 50%,#1A3A8F 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shh);text-align:center}
.login-icon{width:58px;height:58px;margin:0 auto 14px;background:linear-gradient(135deg,var(--gd2),var(--gd3));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.login-box h1{font-family:'DM Serif Display',serif;font-size:20px;color:var(--nv);margin-bottom:3px}
.login-box p{font-size:13px;color:var(--sb);margin-bottom:20px}
.login-input{width:100%;padding:12px;border:2px solid var(--bd);border-radius:9px;font-size:16px;text-align:center;letter-spacing:4px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--nv2)}
.login-btn{width:100%;margin-top:11px;padding:12px;background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;border-radius:9px;font-size:15px;font-weight:800;box-shadow:0 3px 10px rgba(15,31,92,.24)}

/* ── 상단 네비게이션 (HIS Curriculum 스타일) ── */
#main-screen{display:none;flex-direction:column;min-height:100dvh}
.navbar{
  background:var(--nv);
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:52px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(15,31,92,.25);
  gap:12px;
}
.nav-brand h1{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;line-height:1.1;white-space:nowrap}
.nav-brand p{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.nav-tabs{display:flex;gap:4px;align-items:center}
.nav-tab{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:7px;
  font-size:12px;font-weight:700;color:rgba(255,255,255,.7);
  background:transparent;border:1px solid transparent;
  transition:all .14s;white-space:nowrap;
}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-tab.active{color:var(--nv);background:#fff;border-color:#fff}
.nav-tab .tab-icon{font-size:13px}
.nav-logout{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);transition:all .14s}
.nav-logout:hover{color:#fff;background:rgba(255,255,255,.15)}

/* ── 콘텐츠 헤더 ── */
.content-header{
  background:#fff;border-bottom:1px solid var(--bd);
  padding:14px 20px 0;
}
.content-header h2{font-size:16px;font-weight:800;color:var(--nv)}
.content-header p{font-size:12px;color:var(--sb);margin-top:2px;margin-bottom:12px}

/* 액션 바 */
.action-bar{
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  padding-bottom:12px;
}
.abtn{
  display:flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;
  border:1.5px solid var(--bd);background:#fff;color:var(--tx);
  transition:all .13s;white-space:nowrap;
}
.abtn:hover{border-color:var(--nv2);color:var(--nv);background:#f0f4ff}
.abtn.green{background:var(--gn);color:#fff;border-color:var(--gn)}
.abtn.green:hover{background:#166534;border-color:#166534}
.abtn.red{background:var(--rd);color:#fff;border-color:var(--rd)}
.abtn.red:hover{background:#b91c1c;border-color:#b91c1c}
.abtn.gold{background:var(--gd2);color:var(--nv);border-color:var(--gd2)}
.abtn.gold:hover{background:var(--gd3);border-color:var(--gd3)}
.abtn-sep{width:1px;height:22px;background:var(--bd);margin:0 2px}

.unsaved-dot{display:none;width:6px;height:6px;background:#F59E0B;border-radius:50%;flex-shrink:0}
.unsaved-dot.show{display:inline-block}

/* ── 필터 바 ── */
.filter-bar{
  background:#fff;border-bottom:1px solid var(--bd);
  padding:8px 20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;
}
.filter-bar select,.filter-bar input{
  padding:5px 8px;border:1.5px solid var(--bd);border-radius:7px;
  font-size:13px;color:var(--tx);background:#fff;outline:none;
  transition:border-color .2s;height:30px;
}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--nv2)}
.filter-search{flex:1;min-width:180px}
.fcounter{margin-left:auto;font-size:12px;font-weight:700;color:var(--nv2);background:var(--bg);padding:3px 10px;border-radius:20px;white-space:nowrap}

/* ── 테이블 영역 ── */
.tbl-outer{flex:1;overflow-x:auto;overflow-y:auto}
.tbl-outer::-webkit-scrollbar{height:6px;width:6px}
.tbl-outer::-webkit-scrollbar-track{background:var(--bg)}
.tbl-outer::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

table{border-collapse:collapse;font-size:13px;width:100%;min-width:max-content}

/* 테이블 헤더 */
thead{position:sticky;top:0;z-index:100}
th{
  background:var(--nv);color:#fff;
  padding:0;white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.1);
  vertical-align:middle;
}
th:last-child{border-right:none}
.th-inner{display:flex;align-items:center;padding:9px 10px;gap:4px}
.th-label{font-size:11px;font-weight:700;letter-spacing:.3px}
.th-edit{
  opacity:0;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;
  background:rgba(255,255,255,.2);color:#fff;transition:opacity .13s;flex-shrink:0;
}
th:hover .th-edit{opacity:1}
th.col-fixed{background:var(--nv2)}
th.col-custom{background:#1e3a7a}

/* 테이블 바디 */
td{
  padding:4px 8px;border-bottom:1px solid #eaecf5;
  border-right:1px solid #eaecf5;background:#fff;
  vertical-align:middle;white-space:nowrap;
}
td:last-child{border-right:none}
tr:hover td{background:#f8f9ff}
tr.section-row td{
  background:#f5f7ff;font-size:11px;font-weight:800;
  color:var(--sb);padding:5px 12px;border-bottom:1px solid var(--bd);
}

/* 셀 입력 */
.ci{
  width:100%;padding:4px 6px;border:1.5px solid transparent;
  border-radius:5px;background:transparent;color:var(--tx);
  outline:none;transition:all .14s;min-width:60px;
}
.ci:focus{border-color:var(--nv2);background:#fff;box-shadow:0 0 0 3px rgba(27,47,122,.07)}
.ci:hover:not(:focus){border-color:var(--bd);background:#fafbff}
.cs{
  padding:4px 6px;border:1.5px solid transparent;border-radius:5px;
  background:transparent;color:var(--tx);outline:none;cursor:pointer;transition:all .14s;
}
.cs:focus,.cs:hover{border-color:var(--nv2);background:#fff}

/* 학년 뱃지 */
.grade-wrap{display:inline-flex;gap:2px;flex-wrap:wrap;align-items:center}
.gb{
  padding:2px 6px;border-radius:4px;font-size:11px;font-weight:800;
  background:var(--nv);color:#fff;cursor:pointer;transition:background .12s;
}
.gb:hover{background:#e11d48}
.gb-add{background:transparent;color:var(--sb);border:1px dashed var(--bd);font-size:11px;padding:1px 5px;border-radius:4px;cursor:pointer}
.gb-add:hover{background:var(--gnb);color:var(--gn);border-color:var(--gn)}

/* 구분 뱃지 */
.type-교과{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:#EEF2FF;color:#4338CA}
.type-창체{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--gnb);color:var(--gn)}

/* 삭제 버튼 */
.btn-del{padding:3px 9px;background:var(--rdb);color:var(--rd);border:1.5px solid #fecaca;border-radius:5px;font-size:11px;font-weight:700;transition:background .12s}
.btn-del:hover{background:#fee2e2}

/* 로딩 */
.loading-cell{text-align:center;padding:48px;color:var(--sb);font-size:14px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--nv2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 모달 ── */
#modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(8,18,60,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:16px}
#modal-overlay.on{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:22px 20px;width:100%;max-width:380px;box-shadow:var(--shh)}
.modal-box h2{font-size:15px;font-weight:800;color:var(--nv);margin-bottom:13px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--sb);margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--nv2)}
.modal-btns{display:flex;gap:7px;margin-top:14px}
.mbtn-cancel{flex:1;padding:9px;background:var(--bg);border-radius:7px;font-size:13px;font-weight:700;color:var(--sb)}
.mbtn-danger{flex:1;padding:9px;background:var(--rdb);color:var(--rd);border:1.5px solid #fecaca;border-radius:7px;font-size:13px;font-weight:700}
.mbtn-save{flex:2;padding:9px;background:linear-gradient(135deg,var(--nv),var(--nv2));border-radius:7px;font-size:13px;font-weight:800;color:#fff}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ══ 로그인 화면 ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">📋</div>
    <h1>HIS Curriculum</h1>
    <p>Handong International School</p>
    <input type="password" id="login-pw" class="login-input" placeholder="비밀번호"
           maxlength="10" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ══ 메인 화면 ══ -->
<div id="main-screen">

  <!-- 상단 네비게이션 -->
  <nav class="navbar">
    <div class="nav-brand">
      <h1>HIS Curriculum</h1>
      <p>한동글로벌학교</p>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('cards')">
        <span class="tab-icon">📋</span> 과목카드 편집
      </button>
      <!-- 기존 시스템 탭들은 링크로 연결 -->
    </div>
    <button class="nav-logout" onclick="doLogout()">로그아웃</button>
  </nav>

  <!-- 콘텐츠 헤더 -->
  <div class="content-header">
    <h2>과목카드 표 편집</h2>
    <p>과목카드를 표 형태로 한 번에 관리합니다. 저장 버튼을 눌러야 반영됩니다.</p>
    <div class="action-bar">
      <button class="abtn" onclick="importFromSubjects()">🔄 커리큘럼으로</button>
      <div class="abtn-sep"></div>
      <button class="abtn gold" onclick="addCard()">+ 과목카드 추가</button>
      <button class="abtn" onclick="addCustomHeader()">+ 헤더 추가</button>
      <div class="abtn-sep"></div>
      <button class="abtn green" id="save-btn" onclick="saveAll()">
        💾 저장 <span class="unsaved-dot" id="unsaved-dot"></span>
      </button>
      <button class="abtn red" onclick="resetChanges()">↩ 변경 취소</button>
      <div class="abtn-sep"></div>
      <button class="abtn" onclick="exportCSV()">⬇️ CSV</button>
    </div>
  </div>

  <!-- 필터 바 -->
  <div class="filter-bar">
    <input class="filter-search" type="text" id="f-search" placeholder="🔍 과목명/교사 검색" oninput="renderTable()">
    <select id="f-lang" onchange="renderTable()">
      <option value="">전체 언어</option>
      <option>Korean</option><option>English</option><option>Both</option>
    </select>
    <select id="f-type" onchange="renderTable()">
      <option value="">전체 카드</option>
      <option>교과</option><option>창체</option>
    </select>
    <select id="f-sort" onchange="renderTable()">
      <option value="kor">한글명 ↑</option>
      <option value="teacher">교사명 ↑</option>
    </select>
    <select id="f-grade" onchange="renderTable()">
      <option value="">전체 (중+고)</option>
      <option value="mid">중등 (7-9)</option>
      <option value="high">고등 (10-12)</option>
      <option>7</option><option>8</option><option>9</option>
      <option>10</option><option>11</option><option>12</option>
    </select>
    <span class="fcounter" id="counter">0 / 0개</span>
  </div>

  <!-- 테이블 -->
  <div class="tbl-outer">
    <div id="tbl-wrap">
      <div class="loading-cell"><span class="spinner"></span>불러오는 중...</div>
    </div>
  </div>

</div><!-- /main-screen -->

<!-- 헤더 편집 모달 -->
<div id="modal-overlay">
  <div class="modal-box">
    <h2 id="modal-title">헤더 추가</h2>
    <input type="hidden" id="modal-mode">
    <input type="hidden" id="modal-hid">
    <div class="form-row">
      <label>헤더 이름</label>
      <input type="text" id="m-hlabel" placeholder="예: 학급별 시수">
    </div>
    <div class="form-row">
      <label>입력 유형</label>
      <select id="m-htype" onchange="document.getElementById('m-options-row').style.display=this.value==='select'?'block':'none'">
        <option value="text">텍스트</option>
        <option value="number">숫자</option>
        <option value="select">선택</option>
      </select>
    </div>
    <div class="form-row" id="m-options-row" style="display:none">
      <label>선택지 (쉼표 구분)</label>
      <input type="text" id="m-hoptions" placeholder="옵션1,옵션2,옵션3">
    </div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">취소</button>
      <button class="mbtn-danger" id="m-del-btn" onclick="deleteHeader()" style="display:none">삭제</button>
      <button class="mbtn-save" onclick="saveHeader()">저장</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCz-baFM_1-ecp2HUKxrF2aPXhtDv1xxrc",
  authDomain: "his-ptc-2026.firebaseapp.com",
  databaseURL: "https://his-ptc-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "his-ptc-2026",
  storageBucket: "his-ptc-2026.firebasestorage.app",
  messagingSenderId: "712671108934",
  appId: "1:712671108934:web:0782167bb63c3d836b4f47"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CURRICULUM_PW = '1751';
let cards = [], headers = [], allSubjects = {};
let hasChanges = false;
let subjectGroups = [];

const FIXED = [
  {key:'학년들', label:'적용 학년', w:90},
  {key:'구분',   label:'구분',     w:70},
  {key:'한글명', label:'한글 이름', w:120},
  {key:'영어명', label:'영어 이름', w:180},
  {key:'교사',   label:'공통 교사', w:90},
  {key:'언어',   label:'언어',     w:80},
];

// ── 로그인 ──────────────────────────────────────
function doLogin() {
  if (document.getElementById('login-pw').value !== CURRICULUM_PW) {
    toast('비밀번호가 올바르지 않습니다.', 'err');
    document.getElementById('login-pw').value = ''; return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display  = 'flex';
  init();
}
function doLogout() {
  if (hasChanges && !confirm('저장하지 않은 변경사항이 있습니다. 로그아웃하시겠습니까?')) return;
  hasChanges = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display  = 'none';
  document.getElementById('login-pw').value = '';
}
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.closest('.nav-tab').classList.add('active');
}

// ── 데이터 초기화 ────────────────────────────────
async function init() {
  document.getElementById('tbl-wrap').innerHTML =
    '<div class="loading-cell"><span class="spinner"></span>데이터 불러오는 중...</div>';
  try {
    const [cvSnap, chSnap, subSnap] = await Promise.all([
      db.ref('curriculum_cards').once('value'),
      db.ref('curriculum_headers').once('value'),
      db.ref('subjects').once('value'),
    ]);
    allSubjects = subSnap.val() || {};
    headers = [];
    chSnap.forEach(c => headers.push({id:c.key, ...c.val()}));
    cards = [];
    cvSnap.forEach(c => cards.push({id:c.key, ...c.val()}));
    if (!cards.length) await buildCardsFromSubjects();
    renderTable();
  } catch(e) {
    console.error(e);
    document.getElementById('tbl-wrap').innerHTML =
      '<div class="loading-cell">⚠️ 데이터 로드 실패. 새로고침하세요.</div>';
  }
}

// subjects → 카드 자동 생성
async function buildCardsFromSubjects() {
  const map = {};
  Object.values(allSubjects).forEach(s => {
    const k = `${s.과목||''}__${s.교사||''}`;
    if (!map[k]) map[k] = {
      학년들:[], 구분:(s.분류==='교과')?'교과':'창체',
      한글명:(s.과목||'').split(' ')[0]||s.과목||'',
      영어명:(s.과목||'').split(' ').slice(1).join(' ')||'',
      교사:s.교사||'', 언어:'미정', custom:{}
    };
    const g = String(s.학년||'');
    if (g && !map[k].학년들.includes(g)) map[k].학년들.push(g);
  });
  Object.values(map).forEach(c => c.학년들.sort((a,b)=>Number(a)-Number(b)));
  cards = Object.values(map).map((c,i) => ({id:'card_'+Date.now()+'_'+i, ...c}));
  markChanged();
}

async function importFromSubjects() {
  if (!confirm('subjects 데이터로 과목카드를 재생성합니다.\n기존 커스텀 값은 유지됩니다. 계속하시겠습니까?')) return;
  const customMap = {};
  cards.forEach(c => { customMap[`${c.한글명}__${c.교사}`] = c.custom || {}; });
  await buildCardsFromSubjects();
  cards.forEach(c => { const k=`${c.한글명}__${c.교사}`; if(customMap[k]) c.custom=customMap[k]; });
  renderTable();
  toast('재생성 완료', 'ok');
}

// ── 렌더링 ──────────────────────────────────────
function renderTable() {
  const search = (document.getElementById('f-search').value||'').trim().toLowerCase();
  const lang   = document.getElementById('f-lang').value;
  const type   = document.getElementById('f-type').value;
  const sort   = document.getElementById('f-sort').value;
  const gf     = document.getElementById('f-grade').value;

  let filtered = cards.filter(c => {
    if (search && ![(c.한글명||''),(c.영어명||''),(c.교사||'')]
      .join(' ').toLowerCase().includes(search)) return false;
    if (lang && c.언어 !== lang) return false;
    if (type && c.구분 !== type) return false;
    if (gf) {
      if (gf==='mid')  return c.학년들.some(g=>[7,8,9].includes(Number(g)));
      if (gf==='high') return c.학년들.some(g=>[10,11,12].includes(Number(g)));
      return c.학년들.includes(gf);
    }
    return true;
  });

  filtered.sort((a,b) => {
    if (a.구분 !== b.구분) return a.구분==='교과'?-1:1;
    return sort==='teacher'
      ? (a.교사||'').localeCompare(b.교사||'')
      : (a.한글명||'').localeCompare(b.한글명||'');
  });

  document.getElementById('counter').textContent = `${filtered.length} / ${cards.length}개`;

  // 헤더 HTML
  const fixedTh = FIXED.map(col =>
    `<th class="col-fixed" style="min-width:${col.w}px">
       <div class="th-inner"><span class="th-label">${col.label}</span></div>
     </th>`).join('');

  const customTh = headers.map(h =>
    `<th class="col-custom" style="min-width:90px">
       <div class="th-inner">
         <span class="th-label">${h.label}</span>
         <button class="th-edit" data-hid="${h.id}">✏️</button>
       </div>
     </th>`).join('');

  // 행 HTML
  let lastType = '';
  const rowsHTML = filtered.map(card => {
    const idx = cards.indexOf(card);
    let sep = '';
    if (card.구분 !== lastType) {
      lastType = card.구분;
      sep = `<tr class="section-row">
        <td colspan="${FIXED.length+headers.length+1}">
          <span class="type-${card.구분}">${card.구분}</span>
        </td></tr>`;
    }

    // 학년 뱃지
    const grades = card.학년들.map(g =>
      `<span class="gb" data-idx="${idx}" data-g="${g}" title="클릭하여 제거">${g}</span>`
    ).join('') + `<span class="gb-add" data-idx="${idx}">+</span>`;

    // 구분 select
    const typeEl = `<select class="cs" data-idx="${idx}" data-key="구분">
      ${['교과','창체'].map(v=>`<option ${card.구분===v?'selected':''}>${v}</option>`).join('')}
    </select>`;

    // 언어 select
    const langEl = `<select class="cs" data-idx="${idx}" data-key="언어">
      ${['미정','Korean','English','Both'].map(v=>`<option ${card.언어===v?'selected':''}>${v}</option>`).join('')}
    </select>`;

    const fixedTds = [
      `<td><div class="grade-wrap">${grades}</div></td>`,
      `<td>${typeEl}</td>`,
      `<td><input class="ci" style="min-width:90px" value="${esc(card.한글명||'')}" data-idx="${idx}" data-key="한글명"></td>`,
      `<td><input class="ci" style="min-width:150px" value="${esc(card.영어명||'')}" data-idx="${idx}" data-key="영어명"></td>`,
      `<td><input class="ci" style="min-width:70px" value="${esc(card.교사||'')}" data-idx="${idx}" data-key="교사"></td>`,
      `<td>${langEl}</td>`,
    ].join('');

    const customTds = headers.map(h => {
      const val = (card.custom&&card.custom[h.id])||'';
      if (h.type==='select') {
        const opts = (h.options||[]).map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('');
        return `<td><select class="cs" data-idx="${idx}" data-hid="${h.id}"><option></option>${opts}</select></td>`;
      }
      return `<td><input class="ci" type="${h.type||'text'}" value="${esc(val)}" data-idx="${idx}" data-hid="${h.id}" style="min-width:70px"></td>`;
    }).join('');

    const delTd = `<td><button class="btn-del" data-idx="${idx}">삭제</button></td>`;
    return sep + `<tr>${delTd}${fixedTds}${customTds}</tr>`;
  }).join('');

  document.getElementById('tbl-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th class="col-fixed" style="min-width:48px"><div class="th-inner"><span class="th-label">삭제</span></div></th>
        ${fixedTh}${customTh}
      </tr></thead>
      <tbody>${rowsHTML || '<tr><td colspan="20" class="loading-cell">카드가 없습니다.</td></tr>'}</tbody>
    </table>`;

  // 이벤트 위임
  const wrap = document.getElementById('tbl-wrap');
  wrap.onclick = e => {
    // 학년 뱃지 제거
    const gb = e.target.closest('.gb[data-g]');
    if (gb) { removeGrade(+gb.dataset.idx, gb.dataset.g); return; }
    // 학년 추가
    const gba = e.target.closest('.gb-add');
    if (gba) { addGrade(+gba.dataset.idx); return; }
    // 삭제 버튼
    const del = e.target.closest('.btn-del[data-idx]');
    if (del) { deleteCard(+del.dataset.idx); return; }
    // 헤더 편집
    const he = e.target.closest('.th-edit[data-hid]');
    if (he) { openEditHeader(he.dataset.hid); return; }
  };
  wrap.onchange = e => {
    // 고정 컬럼 select/input
    const t = e.target;
    if (t.dataset.idx !== undefined && t.dataset.key) {
      updateCard(+t.dataset.idx, t.dataset.key, t.value); return;
    }
    // 커스텀 컬럼
    if (t.dataset.idx !== undefined && t.dataset.hid) {
      updateCustom(+t.dataset.idx, t.dataset.hid, t.value); return;
    }
  };
  wrap.oninput = e => {
    const t = e.target;
    if (t.tagName==='INPUT' && t.dataset.idx !== undefined && t.dataset.key)
      updateCard(+t.dataset.idx, t.dataset.key, t.value);
    if (t.tagName==='INPUT' && t.dataset.idx !== undefined && t.dataset.hid)
      updateCustom(+t.dataset.idx, t.dataset.hid, t.value);
  };
}

// ── 데이터 조작 ──────────────────────────────────
function updateCard(idx, key, value) { if(cards[idx]) { cards[idx][key]=value; markChanged(); } }
function updateCustom(idx, hid, value) {
  if (!cards[idx]) return;
  if (!cards[idx].custom) cards[idx].custom = {};
  cards[idx].custom[hid] = value; markChanged();
}

function addGrade(idx) {
  const g = prompt('추가할 학년 (7~12):'); if(!g) return;
  if (!['7','8','9','10','11','12'].includes(g.trim())) { toast('7~12 사이 학년을 입력하세요.','err'); return; }
  if (!cards[idx].학년들.includes(g.trim())) {
    cards[idx].학년들.push(g.trim());
    cards[idx].학년들.sort((a,b)=>Number(a)-Number(b));
    markChanged(); renderTable();
  }
}
function removeGrade(idx, g) { cards[idx].학년들=cards[idx].학년들.filter(x=>x!==g); markChanged(); renderTable(); }
function addCard() {
  cards.unshift({id:'card_'+Date.now(), 학년들:[], 구분:'교과', 한글명:'', 영어명:'', 교사:'', 언어:'Korean', custom:{}});
  markChanged(); renderTable();
}
function deleteCard(idx) {
  if (!confirm('이 과목카드를 삭제하시겠습니까?')) return;
  cards.splice(idx,1); markChanged(); renderTable();
}

// ── 헤더 관리 ────────────────────────────────────
function addCustomHeader() {
  document.getElementById('modal-title').textContent = '헤더 추가';
  document.getElementById('modal-mode').value = 'add';
  document.getElementById('m-hlabel').value = '';
  document.getElementById('m-htype').value = 'text';
  document.getElementById('m-hoptions').value = '';
  document.getElementById('m-options-row').style.display = 'none';
  document.getElementById('m-del-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('on');
}
function openEditHeader(hid) {
  const h = headers.find(x=>x.id===hid); if(!h) return;
  document.getElementById('modal-title').textContent = '헤더 편집';
  document.getElementById('modal-mode').value = 'edit';
  document.getElementById('modal-hid').value  = hid;
  document.getElementById('m-hlabel').value   = h.label||'';
  document.getElementById('m-htype').value    = h.type||'text';
  document.getElementById('m-hoptions').value = (h.options||[]).join(',');
  document.getElementById('m-options-row').style.display = h.type==='select'?'block':'none';
  document.getElementById('m-del-btn').style.display = 'block';
  document.getElementById('modal-overlay').classList.add('on');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('on'); }

function saveHeader() {
  const label = document.getElementById('m-hlabel').value.trim();
  const type  = document.getElementById('m-htype').value;
  const opts  = document.getElementById('m-hoptions').value.split(',').map(s=>s.trim()).filter(Boolean);
  if (!label) { toast('헤더 이름을 입력해주세요.','err'); return; }
  if (document.getElementById('modal-mode').value==='add') {
    headers.push({id:'h_'+Date.now(), label, type, options:opts});
  } else {
    const hid = document.getElementById('modal-hid').value;
    const idx = headers.findIndex(h=>h.id===hid);
    if (idx>=0) headers[idx]={...headers[idx], label, type, options:opts};
  }
  markChanged(); closeModal(); renderTable();
}
function deleteHeader() {
  const hid = document.getElementById('modal-hid').value;
  if (!confirm('헤더를 삭제하면 모든 카드의 해당 값도 삭제됩니다.')) return;
  headers = headers.filter(h=>h.id!==hid);
  cards.forEach(c=>{ if(c.custom) delete c.custom[hid]; });
  markChanged(); closeModal(); renderTable();
}

// ── 저장 ─────────────────────────────────────────
function markChanged() {
  hasChanges = true;
  document.getElementById('unsaved-dot').classList.add('show');
}
async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.textContent = '저장 중...'; btn.disabled = true;
  try {
    await db.ref('curriculum_headers').set(
      headers.reduce((acc,h) => { acc[h.id]={label:h.label,type:h.type,options:h.options||[]}; return acc; }, {})
    );
    const obj = {};
    cards.forEach(c => { obj[c.id]={학년들:c.학년들||[],구분:c.구분||'교과',한글명:c.한글명||'',영어명:c.영어명||'',교사:c.교사||'',언어:c.언어||'미정',custom:c.custom||{}}; });
    await db.ref('curriculum_cards').set(obj);
    hasChanges = false;
    document.getElementById('unsaved-dot').classList.remove('show');
    toast(`${cards.length}개 카드 저장 완료`, 'ok');
  } catch(e) { toast('저장 실패: '+e.message,'err'); }
  finally { btn.textContent='💾 저장'; btn.disabled=false; }
}
async function resetChanges() {
  if (!confirm('변경사항을 취소하고 다시 불러오겠습니까?')) return;
  hasChanges = false;
  document.getElementById('unsaved-dot').classList.remove('show');
  await init(); toast('원래대로 되돌렸습니다.','ok');
}

// ── CSV ──────────────────────────────────────────
function exportCSV() {
  const hRow = ['적용학년','구분','한글명','영어명','교사','언어',...headers.map(h=>h.label)];
  const rows = cards.map(c=>[c.학년들.join('/'),c.구분||'',c.한글명||'',c.영어명||'',c.교사||'',c.언어||'',...headers.map(h=>(c.custom&&c.custom[h.id])||'')]);
  const csv = [hRow,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = `HIS_커리큘럼_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 다운로드 완료','ok');
}

// ── 유틸 ─────────────────────────────────────────
function toast(msg,type='') {
  const el=document.getElementById('toast'); el.textContent=msg; el.className=type;
  el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),3000);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
window.addEventListener('beforeunload', e => { if(hasChanges){e.preventDefault();e.returnValue='';} });
</script>
