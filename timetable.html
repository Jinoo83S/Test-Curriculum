<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HIS 시간표</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.tt-topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:#1e3a5f;color:white;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tt-back{color:#93c5fd;text-decoration:none;font-size:12px;white-space:nowrap}
.tt-back:hover{color:white}
.tt-topbar h1{font-size:15px;font-weight:700;color:white;white-space:nowrap}
.tt-topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.tt-auth-status{font-size:11px;color:#93c5fd;white-space:nowrap}
.tt-topbar button{padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:12px}
.tt-topbar button:hover{background:rgba(255,255,255,.2)}
.tt-topbar .tt-save-btn{background:#2563eb;border-color:#2563eb}
.tt-topbar .tt-save-btn:hover{background:#1d4ed8}

/* ── Toolbar ── */
.tt-toolbar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:white;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tt-view-btns{display:flex;gap:0}
.tt-view-btn{padding:5px 12px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280}
.tt-view-btn:first-child{border-radius:6px 0 0 6px}
.tt-view-btn:last-child{border-radius:0 6px 6px 0}
.tt-view-btn.active{background:#2563eb;color:white;border-color:#2563eb}
.tt-toolbar select,.tt-toolbar input[type="number"]{padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;height:30px}
.tt-conflict-bar{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-left:auto}
.tt-conflict-bar-ok{background:#dcfce7;color:#166534}
.tt-conflict-bar-warn{background:#fef3c7;color:#92400e}

/* ── Main layout ── */
.tt-body{display:flex;flex:1;overflow:hidden;gap:0}

/* ── Subject panel ── */
.tt-panel{width:200px;min-width:160px;background:white;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tt-panel-header{padding:8px 10px;border-bottom:1px solid #f1f5f9;background:#f8fafc}
.tt-panel-title{font-size:12px;font-weight:700;color:#1e3a5f}
.tt-panel-grade{font-size:11px;color:#2563eb;font-weight:600}
.tt-panel-scroll{flex:1;overflow-y:auto;padding:6px}
.tt-subject-card{border-left:3px solid #2563eb;border-radius:6px;padding:6px 8px;margin-bottom:5px;cursor:grab;user-select:none;transition:box-shadow .1s;border:1px solid #e2e8f0;border-left-width:3px}
.tt-subject-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.tt-subject-card.tt-dragging{opacity:.4}
.tt-sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.tt-sc-name{font-size:12px;font-weight:600;line-height:1.3;flex:1}
.tt-sc-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.tt-sc-bot{font-size:10px;color:#6b7280;margin-top:2px;display:flex;justify-content:space-between;align-items:center}
.tt-sc-sec{background:#ede9fe;color:#5b21b6;padding:1px 5px;border-radius:999px;font-size:9px;font-weight:700}

/* ── Grid area ── */
.tt-grid-wrap{flex:1;overflow:auto;padding:12px}
.tt-table{border-collapse:collapse;width:100%;table-layout:fixed}
.tt-corner{width:76px;background:#f8fafc;border:1px solid #e2e8f0;padding:6px;vertical-align:top}
.tt-period-count-wrap{display:flex;flex-direction:column;gap:4px;font-size:11px}
.tt-period-count-wrap input{width:40px;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px}
.tt-period-count-wrap button{padding:2px 6px;border:1px solid #2563eb;background:#eff6ff;color:#2563eb;border-radius:4px;cursor:pointer;font-size:11px}
.tt-day-header{background:#1e3a5f;color:white;text-align:center;padding:8px 4px;font-size:13px;font-weight:700;border:1px solid #2d4f7c;width:calc((100% - 76px)/5)}
.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:4px}
.tt-period-label input{width:100%;border:none;background:transparent;text-align:center;font-size:11px;font-weight:600;color:#374151;padding:2px}
.tt-cell{border:1px solid #e2e8f0;vertical-align:top;padding:3px;min-height:72px;transition:background .1s;position:relative}
.tt-cell.tt-dragover{background:#dbeafe;outline:2px dashed #2563eb}
.tt-cell-ph{height:66px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:18px}
.tt-cell-ph::before{content:"+"}

/* ── Entry card ── */
.tt-entry-card{border:1px solid #e2e8f0;border-radius:5px;padding:4px 5px;margin:2px 0;position:relative;font-size:11px}
.tt-entry-card.tt-entry-conflict{outline:2px solid #ef4444;animation:tt-pulse .8s ease-in-out infinite alternate}
@keyframes tt-pulse{from{outline-color:#ef4444}to{outline-color:#fca5a5}}
.tt-entry-title{font-weight:700;font-size:11px;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 18px)}
.tt-entry-row{display:flex;gap:2px;margin-top:2px}
.tt-entry-select{flex:1;min-width:0;font-size:10px;padding:1px 2px;border:1px solid rgba(0,0,0,.15);border-radius:3px;background:rgba(255,255,255,.7)}
.tt-entry-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;border:none;background:rgba(0,0,0,.1);border-radius:3px;cursor:pointer;font-size:10px;line-height:1;color:#374151;padding:0}
.tt-entry-remove:hover{background:rgba(220,38,38,.2);color:#dc2626}

/* ── Bottom panels ── */
.tt-bottom{flex-shrink:0;border-top:1px solid #e2e8f0;background:white;max-height:260px;overflow-y:auto}
.tt-bottom-tab{display:flex;border-bottom:1px solid #e2e8f0}
.tt-bottom-tab-btn{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.tt-bottom-tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}
.tt-bottom-content{padding:12px}
.tt-empty{padding:16px;text-align:center;color:#9ca3af;font-size:12px}

/* ── Constraints table ── */
.tt-constraint-table{width:100%;border-collapse:collapse;font-size:12px}
.tt-constraint-table th{background:#f8fafc;padding:5px 10px;border:1px solid #e2e8f0;font-weight:600;text-align:left;white-space:nowrap}
.tt-constraint-table td{padding:4px 10px;border:1px solid #f1f5f9;vertical-align:middle}
.tt-constraint-table input[type="number"]{width:52px;padding:3px;border:1px solid #d1d5db;border-radius:4px;text-align:center}
.tt-con-name{font-weight:600;color:#1e3a5f;white-space:nowrap}
.tt-con-total{text-align:center;font-weight:700;color:#374151}
.tt-constraint-table tr:hover td{background:#f8fafc}

/* ── Rooms table ── */
.rooms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rooms-header h3{font-size:13px;font-weight:700;color:#1e3a5f}
.rooms-table-wrap{overflow-x:auto}
.rooms-table{width:100%;border-collapse:collapse;font-size:12px}
.rooms-table th{background:#f8fafc;padding:5px 8px;border:1px solid #e2e8f0;font-weight:600;white-space:nowrap;text-align:left}
.rooms-table td{padding:4px 8px;border:1px solid #f1f5f9}
.rooms-table input,.rooms-table select{width:100%;padding:3px 5px;border:1px solid #d1d5db;border-radius:4px;font-size:11px}
.rooms-table input[type="number"]{width:60px}
.rooms-table tr:hover td{background:#f8fafc}
.col-del{width:32px;text-align:center}
.stu-del-btn{width:22px;height:22px;border:none;background:#fee2e2;color:#dc2626;border-radius:4px;cursor:pointer;font-size:14px;line-height:1}
.stu-del-btn:hover{background:#fecaca}

/* ── Utilities ── */
.hidden{display:none!important}
.primary-btn{padding:4px 10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-size:12px;font-weight:600}
.primary-btn:hover{background:#1d4ed8}
.primary-btn:disabled{opacity:.4;cursor:default}
.compact-btn{padding:3px 8px;font-size:11px}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="tt-topbar">
  <a href="index.html" class="tt-back">← HIS Curriculum</a>
  <h1>시간표 편집</h1>
  <div class="tt-topbar-right">
    <span class="tt-auth-status" id="ttAuthStatus">로딩 중...</span>
    <button id="ttLoginBtn">Google 로그인</button>
    <button id="ttLogoutBtn" class="hidden">로그아웃</button>
    <button id="ttExportBtn">📥 엑셀 내보내기</button>
    <button id="ttSaveBtn" class="tt-save-btn">💾 저장</button>
  </div>
</header>

<!-- ── Toolbar ── -->
<div class="tt-toolbar">
  <div class="tt-view-btns">
    <button class="tt-view-btn active" data-view="grade" type="button">📋 학년별</button>
    <button class="tt-view-btn" data-view="teacher" type="button">👩‍🏫 교사별</button>
    <button class="tt-view-btn" data-view="room" type="button">🏫 교실별</button>
  </div>
  <select id="ttGradeSelect"></select>
  <select id="ttTeacherSelect" class="hidden"></select>
  <select id="ttRoomSelect" class="hidden"></select>
  <span id="ttConflictBar" class="tt-conflict-bar tt-conflict-bar-ok">✅ 충돌 없음</span>
</div>

<!-- ── Body ── -->
<div class="tt-body">
  <!-- Subject panel -->
  <aside class="tt-panel">
    <div id="ttPanel" class="tt-panel-scroll"></div>
  </aside>

  <!-- Grid -->
  <div class="tt-grid-wrap" id="ttGridWrap">
    <div id="ttGrid"></div>
  </div>
</div>

<!-- ── Bottom panels ── -->
<div class="tt-bottom">
  <div class="tt-bottom-tab">
    <button class="tt-bottom-tab-btn active" data-tab="constraints" type="button">👩‍🏫 교사 제약 조건</button>
    <button class="tt-bottom-tab-btn" data-tab="rooms" type="button">🏫 교실 관리</button>
  </div>
  <div class="tt-bottom-content">
    <div id="ttConstraintsContent"></div>
    <div id="ttRoomsContent" class="hidden"></div>
  </div>
</div>

<script type="module" src="js/timetable.js"></script>
<script>
// Bottom tab switching
document.querySelectorAll(".tt-bottom-tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tt-bottom-tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("ttConstraintsContent").classList.toggle("hidden", tab !== "constraints");
    document.getElementById("ttRoomsContent").classList.toggle("hidden", tab !== "rooms");
  });
});
</script>
</body>
</html>
