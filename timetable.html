<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HIS 시간표</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.tt-topbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;background:#1e3a5f;color:white;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tt-back{color:#93c5fd;text-decoration:none;font-size:12px;white-space:nowrap}
.tt-back:hover{color:white}
.tt-topbar h1{font-size:14px;font-weight:700;color:white;white-space:nowrap}
.tt-topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.tt-auth-status{font-size:11px;color:#93c5fd;white-space:nowrap}
/* All topbar buttons share same base */
.tt-topbar button{padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:12px;font-weight:600;transition:background .1s}
.tt-topbar button:hover{background:rgba(255,255,255,.22)}
.tt-save-btn  {background:#2563eb!important;border-color:#2563eb!important}
.tt-save-btn:hover{background:#1d4ed8!important}
.tt-auto-btn  {background:#7c3aed!important;border-color:#7c3aed!important}
.tt-auto-btn:hover{background:#6d28d9!important}
.tt-clear-btn {background:rgba(220,38,38,.2)!important;border-color:rgba(252,165,165,.5)!important}
.tt-clear-btn:hover{background:rgba(220,38,38,.35)!important}

/* ── Toolbar ── */
.tt-toolbar{display:flex;align-items:center;gap:8px;padding:5px 14px;background:white;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tt-view-btns{display:flex;gap:0}
.tt-view-btn{padding:4px 12px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;transition:all .1s}
.tt-view-btn:first-child{border-radius:6px 0 0 6px}
.tt-view-btn:last-child{border-radius:0 6px 6px 0}
.tt-view-btn.active{background:#2563eb;color:white;border-color:#2563eb}
.tt-toolbar select{padding:3px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;height:28px}
.tt-conflict-bar{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tt-conflict-bar-ok{background:#dcfce7;color:#166534}
.tt-conflict-bar-warn{background:#fef3c7;color:#92400e}
.tt-toolbar-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.tt-panel-toggle{padding:3px 8px;border:1px solid #d1d5db;border-radius:4px;background:#f8fafc;cursor:pointer;font-size:11px;color:#374151;font-weight:600}
.tt-panel-toggle:hover{background:#eff6ff;color:#2563eb;border-color:#93c5fd}

/* ── Layout ── */
.tt-body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Sidebar panel (resizable) ── */
.tt-panel{width:190px;min-width:0;max-width:400px;background:white;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative}
.tt-panel-collapsed{width:0!important;border-right:none!important}
.tt-panel-resizer{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10;background:transparent}
.tt-panel-resizer::after{content:"";position:absolute;left:3px;top:0;bottom:0;width:2px;background:#d1d5db;transition:background .1s}
.tt-panel-resizer:hover::after{background:#2563eb}
.tt-panel-header-fixed{padding:7px 9px 5px;border-bottom:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0}
.tt-panel-header{display:flex;justify-content:space-between;align-items:center}
.tt-panel-title{font-size:12px;font-weight:700;color:#1e3a5f}
.tt-panel-grade{font-size:11px;color:#2563eb;font-weight:600}
.tt-panel-scroll{flex:1;overflow-y:auto;padding:5px}
.tt-sc-grade-sel{width:100%;padding:3px 5px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;margin-bottom:5px}
.tt-subject-card{border-left:3px solid #2563eb;border-radius:5px;padding:5px 7px;margin-bottom:4px;cursor:grab;user-select:none;border:1px solid #e2e8f0;border-left-width:3px}
.tt-subject-card:hover{box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tt-subject-card.tt-dragging{opacity:.4}
.tt-sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.tt-sc-name{font-size:11px;font-weight:600;line-height:1.3;flex:1}
.tt-sc-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap}
.tt-sc-bot{font-size:10px;color:#6b7280;margin-top:2px;display:flex;justify-content:space-between}
.tt-sc-sec{background:#ede9fe;color:#5b21b6;padding:1px 4px;border-radius:999px;font-size:9px;font-weight:700}

/* ── Grid ── */
.tt-grid-wrap{flex:1;overflow:auto;padding:10px}
.tt-table{border-collapse:collapse;width:100%;table-layout:fixed}
.tt-corner{width:46px;background:#1e3a5f;border:1px solid #2d4f7c;padding:4px;vertical-align:middle;text-align:center}







.tt-day-header{background:#1e3a5f;color:white;text-align:center;padding:5px 2px;font-size:12px;font-weight:700;border:1px solid #2d4f7c;width:calc((100% - 46px)/5)}
.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:2px;width:46px}
.tt-period-label input{width:100%;border:none;background:transparent;text-align:center;font-size:9px;font-weight:700;color:#374151;padding:1px}
.tt-lunch-row .tt-period-label{font-size:14px;text-align:center}
.tt-lunch-cell{background:#fef9c3;color:#92400e;text-align:center;font-size:10px;font-weight:600;padding:3px;border:1px solid #fde68a}
.tt-cell{border:1px solid #e2e8f0;vertical-align:top;padding:2px;height:54px;position:relative}
.tt-cell.tt-dragover{background:#dbeafe;outline:2px dashed #2563eb}
.tt-cell-ph{min-height:40px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px;pointer-events:none}
.tt-cell-ph::before{content:"+"}

/* ── Entry card ── */
.tt-entry-card{border:1px solid rgba(0,0,0,.12);border-radius:4px;padding:2px 4px;position:relative;font-size:10px;border-left-width:4px;margin-bottom:2px;min-width:0;overflow:hidden}
.tt-entry-card.tt-entry-conflict{outline:2px solid #ef4444;animation:tt-pulse .8s ease-in-out infinite alternate}
@keyframes tt-pulse{from{outline-color:#ef4444}to{outline-color:#fca5a5}}
.tt-entry-grade{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(0,0,0,.12);margin-bottom:2px;white-space:nowrap}
.tt-entry-title{font-weight:700;font-size:10px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px}
.tt-entry-has-grade .tt-entry-title{padding-right:54px}
.tt-entry-row{display:flex;gap:2px;margin-top:2px}
.tt-entry-select{flex:1;min-width:0;font-size:10px;padding:1px 2px;border:1px solid rgba(0,0,0,.15);border-radius:3px;background:rgba(255,255,255,.7)}
.tt-entry-remove{position:absolute;top:2px;right:2px;width:13px;height:13px;border:none;background:rgba(0,0,0,.1);border-radius:3px;cursor:pointer;font-size:10px;line-height:1;color:#374151;padding:0;z-index:1}
.tt-entry-remove:hover{background:rgba(220,38,38,.2);color:#dc2626}
.tt-entry-card.tt-dragging{opacity:.45;outline:2px dashed #2563eb}
.tt-compact{padding:2px 3px!important;font-size:10px!important}
.tt-compact .tt-entry-title{font-size:10px}
.tt-compact .tt-entry-grade{font-size:8px;padding:0 4px}

/* ── Bottom panel (resizable) ── */
.tt-bottom{flex-shrink:0;display:flex;flex-direction:column;background:white;height:220px;min-height:0;overflow:hidden}
.tt-bottom-collapsed{height:0!important}
.tt-bottom-resizer{height:8px;cursor:row-resize;background:#f1f5f9;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none}
.tt-bottom-resizer::after{content:"⋯";font-size:11px;color:#9ca3af;letter-spacing:3px}
.tt-bottom-resizer:hover{background:#eff6ff}
.tt-bottom-resizer:hover::after{color:#2563eb}
.tt-bottom-scroll{flex:1;overflow-y:auto}
.tt-bottom-tab{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;position:sticky;top:0;z-index:1}
.tt-bottom-tab-btn{padding:6px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.tt-bottom-tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}
.tt-bottom-content{padding:10px}
.tt-empty{padding:12px;text-align:center;color:#9ca3af;font-size:12px}

/* ── Constraints table ── */
.tt-constraint-table{width:100%;border-collapse:collapse;font-size:12px}
.tt-constraint-table th{background:#f8fafc;padding:5px 10px;border:1px solid #e2e8f0;font-weight:600;text-align:left;white-space:nowrap}
.tt-constraint-table td{padding:4px 10px;border:1px solid #f1f5f9;vertical-align:middle}
.tt-constraint-table input[type="number"]{width:52px;padding:3px;border:1px solid #d1d5db;border-radius:4px;text-align:center}
.tt-con-name{font-weight:600;color:#1e3a5f;white-space:nowrap}
.tt-con-total{text-align:center;font-weight:700;color:#374151}
.tt-constraint-table tr:hover td{background:#f8fafc}
.tt-con-hint{font-size:11px;color:#6b7280;margin-bottom:8px;padding:4px 6px;background:#f8fafc;border-radius:4px}
.tt-con-default{font-size:10px;font-weight:400;color:#9ca3af}

/* ── Rooms table ── */
.rooms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rooms-header h3{font-size:12px;font-weight:700;color:#1e3a5f}
.rooms-table-wrap{overflow-x:auto}
.rooms-table{width:100%;border-collapse:collapse;font-size:11px}
.rooms-table th{background:#f8fafc;padding:4px 6px;border:1px solid #e2e8f0;font-weight:600;white-space:nowrap}
.rooms-table td{padding:3px 6px;border:1px solid #f1f5f9}
.rooms-table input,.rooms-table select{width:100%;padding:2px 4px;border:1px solid #d1d5db;border-radius:3px;font-size:10px}
.rooms-table input[type="number"]{width:52px}
.rooms-table tr:hover td{background:#f8fafc}
.col-del{width:30px;text-align:center}
.stu-del-btn{width:20px;height:20px;border:none;background:#fee2e2;color:#dc2626;border-radius:3px;cursor:pointer;font-size:13px;line-height:1}
.stu-del-btn:hover{background:#fecaca}
.hidden{display:none!important}
.primary-btn{padding:4px 10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-size:12px;font-weight:600}
.primary-btn:hover{background:#1d4ed8}
.primary-btn:disabled{opacity:.4;cursor:default}
.compact-btn{padding:3px 8px;font-size:11px}
/* ── Schedule toolbar controls ── */
.tt-schedule-controls{display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;font-size:11px;white-space:nowrap}
.tt-schedule-controls label{color:#374151;font-size:11px}
.tt-check-label{display:flex;align-items:center;gap:3px;cursor:pointer}
.tt-sc-sep{color:#d1d5db;font-size:12px}
.tt-schedule-controls input[type="number"]{width:40px;height:24px;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;text-align:center}
.tt-schedule-controls select{height:24px;padding:2px 5px;font-size:11px;border:1px solid #d1d5db;border-radius:4px}
.tt-schedule-controls button{height:24px;padding:2px 7px;border:1px solid #2563eb;border-radius:4px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:11px;font-weight:600}
/* ── Corner label (simplified) ── */
.tt-corner-label{font-size:10px;font-weight:700;color:white;text-align:center}
/* ── Card grid ── */
.tt-cell-card-grid{display:grid;grid-template-columns:repeat(var(--tt-card-cols,2),minmax(0,1fr));gap:2px;align-items:start}
/* ── Entry card compact ── */
.tt-compact{padding:2px 3px!important}
.tt-compact .tt-entry-title{font-size:10px;line-height:1.2}
.tt-compact .tt-entry-row{margin-top:1px}
.tt-compact .tt-entry-select{height:18px;font-size:9px;padding:0 2px}
.tt-compact .tt-entry-grade{font-size:8px;padding:0 4px;margin-bottom:1px}
/* ── Panel section titles ── */
.tt-panel-section-title{margin:6px 0 3px;padding:3px 5px;border-radius:4px;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700}
.tt-panel-section-done{background:#f1f5f9!important;color:#64748b!important;margin-top:10px!important}
.tt-subject-done{opacity:.5;cursor:default}
.tt-subject-done .tt-sc-badge{background:#dcfce7!important;color:#166534!important}
/* ── Grade chip on entry card ── */
.tt-entry-grade{position:absolute;top:2px;right:17px;display:inline-block;font-size:8px;font-weight:700;padding:0 4px;border-radius:999px;white-space:nowrap;line-height:14px}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="tt-topbar">
  <a href="index.html" class="tt-back">← HIS</a>
  <h1>시간표 편집</h1>
  <div class="tt-topbar-right">
    <span class="tt-auth-status" id="ttAuthStatus">로딩 중...</span>
    <button id="ttLoginBtn">Google 로그인</button>
    <button id="ttLogoutBtn" class="hidden">로그아웃</button>
    <button id="ttExportBtn">📥 엑셀</button>
    <button id="ttClearGradeBtn" class="tt-clear-btn" type="button">🗑 초기화</button>
    <button id="ttAutoAssignBtn" class="tt-auto-btn" type="button">🎲 자동 배치</button>
    <button id="ttSaveBtn" class="tt-save-btn">💾 저장</button>
  </div>
</header>

<!-- ── Toolbar ── -->
<div class="tt-toolbar">
  <div class="tt-view-btns">
    <button class="tt-view-btn active" data-view="all"     type="button">🗂 전체</button>
    <button class="tt-view-btn"        data-view="teacher" type="button">👩‍🏫 교사별</button>
    <button class="tt-view-btn"        data-view="room"    type="button">🏫 교실별</button>
    <button class="tt-view-btn"        data-view="grade"   type="button">📋 학년별</button>
  </div>
  <!-- Schedule controls -->
  <div class="tt-schedule-controls">
    <label>교시</label>
    <input id="ttPeriodCountInput" type="number" min="1" max="12" value="8">
    <button id="ttPeriodApplyBtn" type="button">적용</button>
    <span class="tt-sc-sep">│</span>
    <label class="tt-check-label"><input id="ttShowLunchInput" type="checkbox" checked> 점심</label>
    <select id="ttLunchAfterSelect"></select>
    <span class="tt-sc-sep">│</span>
    <label>열</label>
    <select id="ttCardColumnSelect">
      <option value="1">1열</option>
      <option value="2" selected>2열</option>
      <option value="3">3열</option>
      <option value="4">4열</option>
    </select>
  </div>
  <select id="ttGradeSelect"   class="hidden"></select>
  <select id="ttTeacherSelect" class="hidden"></select>
  <select id="ttRoomSelect"    class="hidden"></select>
  <span id="ttConflictBar" class="tt-conflict-bar tt-conflict-bar-ok">✅ 충돌 없음</span>
  <div class="tt-toolbar-right">
    <button class="tt-panel-toggle" id="ttToggleSidebar" type="button">◀ 패널</button>
    <button class="tt-panel-toggle" id="ttToggleBottom"  type="button">▼ 하단</button>
  </div>
</div>

<!-- ── Body ── -->
<div class="tt-body">
  <aside class="tt-panel" id="ttPanelWrap">
    <div class="tt-panel-resizer" id="ttPanelResizer"></div>
    <div id="ttPanelHeader" class="tt-panel-header-fixed"></div>
    <div id="ttPanel" class="tt-panel-scroll"></div>
  </aside>
  <div class="tt-grid-wrap"><div id="ttGrid"></div></div>
</div>

<!-- ── Bottom panel ── -->
<div class="tt-bottom" id="ttBottom">
  <div class="tt-bottom-resizer" id="ttBottomResizer"></div>
  <div class="tt-bottom-scroll">
    <div class="tt-bottom-tab">
      <button class="tt-bottom-tab-btn active" data-tab="constraints">👩‍🏫 교사 제약</button>
      <button class="tt-bottom-tab-btn"         data-tab="rooms">🏫 교실 관리</button>
    </div>
    <div class="tt-bottom-content">
      <div id="ttConstraintsContent"></div>
      <div id="ttRoomsContent" class="hidden"></div>
    </div>
  </div>
</div>

<script type="module" src="js/timetable.js"></script>
<script>
/* ── Schedule controls init ── */
(function() {
  const pcBtn   = document.getElementById("ttPeriodApplyBtn");
  const lunchChk= document.getElementById("ttShowLunchInput");
  const lunchSel= document.getElementById("ttLunchAfterSelect");
  const colSel  = document.getElementById("ttCardColumnSelect");
  // These just wire up; actual state is in timetable.js via renderScheduleControls()
  // Listeners are set after module loads via renderScheduleControls() binding
  pcBtn?.addEventListener("click", () => window._ttApplyPeriod?.());
  lunchChk?.addEventListener("change", e => window._ttSetLunch?.(undefined, e.target.checked));
  lunchSel?.addEventListener("change", e => window._ttSetLunchAfter?.(parseInt(e.target.value)));
  colSel?.addEventListener("change", e => window._ttSetCardCols?.(parseInt(e.target.value)||2));
})();

/* ── Tab switching ── */
document.querySelectorAll(".tt-bottom-tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tt-bottom-tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const t = btn.dataset.tab;
    document.getElementById("ttConstraintsContent").classList.toggle("hidden", t !== "constraints");
    document.getElementById("ttRoomsContent").classList.toggle("hidden", t !== "rooms");
  });
});

/* ── Sidebar resize & toggle ── */
(function() {
  const panel  = document.getElementById("ttPanelWrap");
  const resizer= document.getElementById("ttPanelResizer");
  const btn    = document.getElementById("ttToggleSidebar");
  let w = parseInt(localStorage.getItem("tt_sbW") || "190");
  let col = false;

  function apply(newW, collapsed) {
    col = collapsed;
    if (collapsed) { panel.classList.add("tt-panel-collapsed"); btn.textContent = "▶ 패널"; }
    else { panel.classList.remove("tt-panel-collapsed"); panel.style.width = newW + "px"; btn.textContent = "◀ 패널"; }
  }
  apply(w, false);

  resizer.addEventListener("mousedown", e => {
    e.preventDefault();
    const x0 = e.clientX, w0 = panel.offsetWidth;
    const mv = ev => { w = Math.max(120, Math.min(420, w0 + ev.clientX - x0)); apply(w, false); };
    const up = () => { localStorage.setItem("tt_sbW", w); document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv); document.addEventListener("mouseup", up);
  });
  btn.addEventListener("click", () => {
    if (col) apply(w, false);
    else { w = panel.offsetWidth; localStorage.setItem("tt_sbW", w); apply(w, true); }
  });
})();

/* ── Bottom resize & toggle ── */
(function() {
  const bottom  = document.getElementById("ttBottom");
  const resizer = document.getElementById("ttBottomResizer");
  const btn     = document.getElementById("ttToggleBottom");
  let h = parseInt(localStorage.getItem("tt_botH") || "220");
  let col = false;

  function apply(newH, collapsed) {
    col = collapsed;
    if (collapsed) { bottom.classList.add("tt-bottom-collapsed"); btn.textContent = "▲ 하단"; }
    else { bottom.classList.remove("tt-bottom-collapsed"); bottom.style.height = newH + "px"; btn.textContent = "▼ 하단"; }
  }
  apply(h, false);

  resizer.addEventListener("mousedown", e => {
    e.preventDefault();
    /* Use bodyEl bottom as anchor so drag direction feels natural (drag up = taller) */
    const bodyEl = document.querySelector(".tt-body");
    const anchor = bodyEl.getBoundingClientRect().bottom;
    const mv = ev => { h = Math.max(60, Math.min(600, anchor - ev.clientY)); apply(h, false); };
    const up = () => { localStorage.setItem("tt_botH", h); document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv); document.addEventListener("mouseup", up);
  });
  btn.addEventListener("click", () => {
    if (col) apply(h, false);
    else { h = bottom.offsetHeight; localStorage.setItem("tt_botH", h); apply(h, true); }
  });
})();
</script>
</body>
</html>
