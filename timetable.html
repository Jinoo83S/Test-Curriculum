<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HIS 시간표</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.tt-topbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;background:#1e3a5f;color:white;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tt-back{color:#93c5fd;text-decoration:none;font-size:12px;white-space:nowrap}
.tt-back:hover{color:white}
.tt-topbar h1{font-size:14px;font-weight:700;color:white;white-space:nowrap}
.tt-topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.tt-auth-status{font-size:11px;color:#93c5fd;white-space:nowrap}
.tt-topbar button{padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:12px;font-weight:600;transition:background .1s}
.tt-topbar button:hover{background:rgba(255,255,255,.22)}
.tt-save-btn {background:#2563eb!important;border-color:#2563eb!important}
.tt-save-btn:hover{background:#1d4ed8!important}
.tt-auto-btn {background:#7c3aed!important;border-color:#7c3aed!important}
.tt-auto-btn:hover{background:#6d28d9!important}
.tt-clear-btn{background:rgba(220,38,38,.2)!important;border-color:rgba(252,165,165,.5)!important}
.tt-clear-btn:hover{background:rgba(220,38,38,.35)!important}

/* ── Toolbar ── */
.tt-toolbar{display:flex;align-items:center;gap:8px;padding:5px 14px;background:white;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tt-view-btns{display:flex;gap:0}
.tt-view-btn{padding:4px 12px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;transition:all .1s}
.tt-view-btn:first-child{border-radius:6px 0 0 6px}
.tt-view-btn:last-child{border-radius:0 6px 6px 0}
.tt-view-btn.active{background:#2563eb;color:white;border-color:#2563eb}
.tt-toolbar select{padding:3px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;height:28px}
.tt-schedule-controls{display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;font-size:11px;white-space:nowrap}
.tt-schedule-controls label{color:#374151;font-size:11px}
.tt-schedule-controls input[type="number"]{width:40px;height:24px;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;text-align:center}
.tt-schedule-controls button{height:24px;padding:2px 7px;border:1px solid #2563eb;border-radius:4px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:11px;font-weight:600}
.tt-conflict-bar{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tt-conflict-bar-ok{background:#dcfce7;color:#166534}
.tt-conflict-bar-warn{background:#fef3c7;color:#92400e}
.tt-toolbar-right{display:flex;gap:6px;margin-left:auto;align-items:center}

/* ── Layout: grid only ── */
.tt-body{flex:1;overflow:auto;padding:10px}
.tt-table{border-collapse:collapse;width:100%;table-layout:fixed}
.tt-corner{width:46px;background:#1e3a5f;border:1px solid #2d4f7c;padding:4px;vertical-align:middle;text-align:center}
.tt-corner-label{font-size:10px;font-weight:700;color:white}
.tt-day-header{background:#1e3a5f;color:white;text-align:center;padding:6px 2px;font-size:13px;font-weight:700;border:1px solid #2d4f7c;border-right:3px solid #1e3a5f;width:calc((100% - 46px)/5)}
/* Day column alternating tint — applied via JS data-day attribute */
.tt-cell[data-day="0"]{background:#ffffff}
.tt-cell[data-day="1"]{background:#f8faff}
.tt-cell[data-day="2"]{background:#ffffff}
.tt-cell[data-day="3"]{background:#f8faff}
.tt-cell[data-day="4"]{background:#ffffff}
.tt-cell[data-day="0"].tt-dragover,.tt-cell[data-day="1"].tt-dragover,.tt-cell[data-day="2"].tt-dragover,.tt-cell[data-day="3"].tt-dragover,.tt-cell[data-day="4"].tt-dragover{background:#dbeafe}
/* Period label row height */
.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:3px;width:46px}

.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:2px;width:46px}
.tt-period-label input{width:100%;border:none;background:transparent;text-align:center;font-size:9px;font-weight:700;color:#374151;padding:1px}
.tt-cell{border:1px solid #e2e8f0;vertical-align:top;padding:3px;position:relative;min-height:52px}
.tt-cell.tt-dragover{background:#dbeafe;outline:2px dashed #2563eb}
.tt-cell-ph{min-height:40px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px;pointer-events:none}
.tt-cell-ph::before{content:"+"}

/* ── Single-row card grid: all cards in one row, auto-shrink ── */
.tt-cell-card-grid{display:flex;flex-direction:row;flex-wrap:nowrap;gap:2px;width:100%;overflow:hidden}
.tt-cell-card-grid .tt-entry-card{flex:1;min-width:0;overflow:hidden}

/* ── Entry card — 2-row layout ── */
.tt-entry-card{border:1px solid rgba(0,0,0,.12);border-radius:4px;padding:3px 5px;position:relative;font-size:10px;border-left-width:4px;min-width:0;overflow:hidden;cursor:pointer}
.tt-entry-card.tt-entry-conflict{outline:2px solid #ef4444;animation:tt-pulse .8s ease-in-out infinite alternate}
@keyframes tt-pulse{from{outline-color:#ef4444}to{outline-color:#fca5a5}}
.tt-entry-row1{display:flex;align-items:flex-start;gap:2px;min-height:16px}
.tt-entry-title{flex:1;min-width:0;font-weight:700;font-size:11px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
.tt-entry-pin{flex-shrink:0;width:14px;height:14px;border:none;background:transparent;cursor:pointer;font-size:10px;padding:0;opacity:.35;transition:opacity .1s;line-height:1}
.tt-entry-pin:hover{opacity:1}
.tt-entry-pinned .tt-entry-pin{opacity:1}
.tt-entry-pinned{outline:2px solid #f59e0b!important;outline-offset:-1px}
.tt-entry-row2{display:flex;align-items:center;justify-content:space-between;gap:3px;min-height:13px;margin-top:2px}
.tt-entry-teacher{flex:1;min-width:0;font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-entry-grade-chips{display:flex;gap:2px;flex-shrink:0}
.tt-entry-grade{display:inline-block;font-size:8px;font-weight:700;padding:0 4px;border-radius:3px;white-space:nowrap;line-height:14px}
.tt-entry-card.tt-dragging{opacity:.45;outline:2px dashed #2563eb}

/* ── Bottom panel (resizable, tabs: 과목카드 / 교사조건 / 교실관리) ── */
.tt-bottom{flex-shrink:0;display:flex;flex-direction:column;background:white;height:260px;min-height:0;overflow:hidden;border-top:1px solid #e2e8f0}
.tt-bottom-collapsed{height:0!important}
.tt-bottom-resizer{height:8px;cursor:row-resize;background:#f1f5f9;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none}
.tt-bottom-resizer::after{content:"⋯";font-size:11px;color:#9ca3af;letter-spacing:3px}
.tt-bottom-resizer:hover{background:#eff6ff}
.tt-bottom-resizer:hover::after{color:#2563eb}
.tt-bottom-scroll{flex:1;overflow-y:auto}
.tt-bottom-tab{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;position:sticky;top:0;z-index:2;flex-shrink:0}
.tt-bottom-tab-btn{padding:6px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tt-bottom-tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}
.tt-bottom-content{padding:8px 10px}

/* ── Subject panel in bottom bar ── */
.tt-sc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tt-sc-grade-sel{padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:11px}
.tt-sc-cards{display:flex;flex-direction:row;flex-wrap:wrap;gap:4px}
.tt-subject-card{border-left:3px solid #2563eb;border-radius:5px;padding:4px 7px;cursor:grab;user-select:none;border:1px solid #e2e8f0;border-left-width:3px;min-width:110px;max-width:180px}
.tt-subject-card:hover{box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tt-subject-card.tt-dragging{opacity:.4}
.tt-sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.tt-sc-name{font-size:11px;font-weight:600;line-height:1.3;flex:1}
.tt-sc-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap}
.tt-sc-bot{font-size:10px;color:#6b7280;margin-top:2px;display:flex;justify-content:space-between}
.tt-sc-sec{background:#ede9fe;color:#5b21b6;padding:1px 4px;border-radius:999px;font-size:9px;font-weight:700}
.tt-subject-done{opacity:.5;cursor:default}
.tt-panel-section-title{margin:0 0 4px;padding:2px 5px;border-radius:4px;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;display:inline-block}
.tt-panel-section-done{background:#f1f5f9!important;color:#64748b!important}

/* ── Constraints table ── */
.tt-constraint-table{width:100%;border-collapse:collapse;font-size:12px}
.tt-constraint-table th{background:#f8fafc;padding:5px 10px;border:1px solid #e2e8f0;font-weight:600;text-align:left;white-space:nowrap}
.tt-constraint-table td{padding:4px 10px;border:1px solid #f1f5f9;vertical-align:middle}
.tt-constraint-table input[type="number"]{width:52px;padding:3px;border:1px solid #d1d5db;border-radius:4px;text-align:center}
.tt-con-name{font-weight:600;color:#1e3a5f;white-space:nowrap}
.tt-con-hint{font-size:11px;color:#6b7280;margin-bottom:8px;padding:4px 6px;background:#f8fafc;border-radius:4px}
.tt-constraint-table tr:hover td{background:#f8fafc}

/* ── Rooms table ── */
.rooms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rooms-header h3{font-size:12px;font-weight:700;color:#1e3a5f}
.rooms-table{width:100%;border-collapse:collapse;font-size:11px}
.rooms-table th{background:#f8fafc;padding:4px 6px;border:1px solid #e2e8f0;font-weight:600;white-space:nowrap}
.rooms-table td{padding:3px 6px;border:1px solid #f1f5f9}
.rooms-table input,.rooms-table select{width:100%;padding:2px 4px;border:1px solid #d1d5db;border-radius:3px;font-size:10px}
.rooms-table input[type="number"]{width:52px}
.rooms-table tr:hover td{background:#f8fafc}
.col-del{width:30px;text-align:center}
.stu-del-btn{width:20px;height:20px;border:none;background:#fee2e2;color:#dc2626;border-radius:3px;cursor:pointer;font-size:13px;line-height:1}
.stu-del-btn:hover{background:#fecaca}
.tt-empty{padding:12px;text-align:center;color:#9ca3af;font-size:12px}
.hidden{display:none!important}
.primary-btn{padding:4px 10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-size:12px;font-weight:600}
.primary-btn:hover{background:#1d4ed8}
.primary-btn:disabled{opacity:.4;cursor:default}
.compact-btn{padding:3px 8px;font-size:11px}
/* ── Bottom toggle button ── */
.tt-bottom-toggle-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid #d1d5db;border-radius:6px;background:#f8fafc;color:#374151;cursor:pointer;font-size:12px;font-weight:600;transition:all .1s}
.tt-bottom-toggle-btn:hover{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
.tt-bottom-toggle-btn.active{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
#ttToggleIcon{font-size:14px;line-height:1;transition:transform .2s}
.tt-bottom-toggle-btn.active #ttToggleIcon{transform:rotate(180deg)}
.tt-entry-card{border:1px solid rgba(0,0,0,.12);border-radius:4px;padding:3px 5px;font-size:10px;border-left-width:4px;min-width:0;overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.tt-entry-teacher{font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.tt-entry-pin{width:13px;height:13px;border:none;background:transparent;cursor:pointer;font-size:10px;padding:0;opacity:.4;transition:opacity .1s;flex-shrink:0;line-height:1}
.tt-entry-pin:hover,.tt-entry-pinned .tt-entry-pin{opacity:1}
.tt-entry-pinned{outline:2px solid #f59e0b!important;outline-offset:-1px}
.tt-entry-conflict{outline:2px solid #ef4444}
.tt-entry-card.tt-dragging{opacity:.45;outline:2px dashed #2563eb}
/* Day column right border separators */
.tt-cell[data-day="0"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="1"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="2"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="3"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="4"]{border-right:1px solid #e2e8f0}
</style>
</head>
<body>
<header class="tt-topbar">
  <a href="index.html" class="tt-back">← HIS</a>
  <h1>시간표 편집</h1>
  <div class="tt-topbar-right">
    <span class="tt-auth-status" id="ttAuthStatus">로딩 중...</span>
    <button id="ttLoginBtn">Google 로그인</button>
    <button id="ttLogoutBtn" class="hidden">로그아웃</button>
    <button id="ttExportBtn">📥 엑셀</button>
    <button id="ttClearGradeBtn" class="tt-clear-btn" type="button">🗑 초기화</button>
    <button id="ttAutoAssignBtn" class="tt-auto-btn" type="button">🎲 자동 배치</button>
    <button id="ttSaveBtn" class="tt-save-btn">💾 저장</button>
  </div>
</header>

<div class="tt-toolbar">
  <div class="tt-view-btns">
    <button class="tt-view-btn active" data-view="all"     type="button">🗂 전체</button>
    <button class="tt-view-btn"        data-view="teacher" type="button">👩‍🏫 교사별</button>
    <button class="tt-view-btn"        data-view="room"    type="button">🏫 교실별</button>
    <button class="tt-view-btn"        data-view="grade"   type="button">📋 학년별</button>
    <button class="tt-view-btn"        data-view="class"   type="button">🏷 학년·반별</button>
  </div>
  <select id="ttGradeSelect"   class="hidden"></select>
  <select id="ttTeacherSelect" class="hidden"></select>
  <select id="ttRoomSelect"    class="hidden"></select>

  <!-- Schedule controls: 교시만, 점심 삭제 -->
  <div class="tt-schedule-controls">
    <label>교시</label>
    <input id="ttPeriodCountInput" type="number" min="1" max="12" value="8">
    <button id="ttPeriodApplyBtn" type="button">적용</button>
  </div>

  <span id="ttConflictBar" class="tt-conflict-bar tt-conflict-bar-ok">✅ 충돌 없음</span>
  <div class="tt-toolbar-right">
    <button id="ttToggleBottom" class="tt-bottom-toggle-btn" type="button" title="하단 패널 숨기기/보이기">
      <span id="ttToggleIcon">⌄</span> 과목·조건
    </button>
  </div>
</div>

<!-- Grid only - no sidebar -->
<div class="tt-body"><div id="ttGrid"></div></div>

<!-- Bottom panel: 과목카드 / 교사조건 / 교실관리 -->
<div class="tt-bottom" id="ttBottom">
  <div class="tt-bottom-resizer" id="ttBottomResizer"></div>
  <div class="tt-bottom-scroll">
    <div class="tt-bottom-tab">
      <button class="tt-bottom-tab-btn active" data-tab="subjects">📚 과목 카드</button>
      <button class="tt-bottom-tab-btn"         data-tab="constraints">👩‍🏫 교사 조건</button>
      <button class="tt-bottom-tab-btn"         data-tab="rooms">🏫 교실 관리</button>
    </div>
    <div class="tt-bottom-content">
      <div id="ttSubjectsContent"></div>
      <div id="ttConstraintsContent" class="hidden"></div>
      <div id="ttRoomsContent" class="hidden"></div>
    </div>
  </div>
</div>

<script type="module" src="js/timetable.js"></script>
<script>
/* ── Tab switching ── */
document.querySelectorAll(".tt-bottom-tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tt-bottom-tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const t = btn.dataset.tab;
    document.getElementById("ttSubjectsContent").classList.toggle("hidden", t !== "subjects");
    document.getElementById("ttConstraintsContent").classList.toggle("hidden", t !== "constraints");
    document.getElementById("ttRoomsContent").classList.toggle("hidden", t !== "rooms");
  });
});

/* ── Bottom resize & toggle ── */
(function() {
  const bottom  = document.getElementById("ttBottom");
  const resizer = document.getElementById("ttBottomResizer");
  let h = parseInt(localStorage.getItem("tt_botH") || "260");
  bottom.style.height = h + "px";

  resizer.addEventListener("mousedown", e => {
    e.preventDefault();
    // Anchor = viewport bottom of the grid area (above the resizer)
    const gridEl = document.querySelector(".tt-body");
    const gridBottom = gridEl ? gridEl.getBoundingClientRect().bottom : window.innerHeight;
    const startY = e.clientY;
    const startH = bottom.offsetHeight;

    const mv = ev => {
      // Moving up = larger bottom panel
      const delta = startY - ev.clientY;
      h = Math.max(60, Math.min(600, startH + delta));
      bottom.style.height = h + "px";
    };
    const up = () => {
      localStorage.setItem("tt_botH", h);
      document.removeEventListener("mousemove", mv);
      document.removeEventListener("mouseup", up);
    };
    document.addEventListener("mousemove", mv);
    document.addEventListener("mouseup", up);
  });
})();

/* ── Bottom bar toggle (synced with resizer h variable via shared ref) ── */
window._ttBottomToggle = (function() {
  const bottom = document.getElementById("ttBottom");
  const btn    = document.getElementById("ttToggleBottom");
  const icon   = document.getElementById("ttToggleIcon");
  let collapsed = false;

  function getH() { return parseInt(localStorage.getItem("tt_botH") || "260"); }

  function show() { collapsed = false; bottom.style.height = getH()+"px"; bottom.style.overflow=""; btn.classList.remove("active"); }
  function hide() { collapsed = true;  bottom.style.height = "0";         bottom.style.overflow="hidden"; btn.classList.add("active"); }

  btn?.addEventListener("click", () => { collapsed ? show() : hide(); });
  return { show, hide, isCollapsed: () => collapsed };
})();

/* ── Schedule controls ── */
(function() {
  document.getElementById("ttPeriodApplyBtn")?.addEventListener("click", () => {
    window._ttApplyPeriod?.();
  });
})();
</script>
</body>
</html>
