<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HIS 시간표</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.tt-topbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;background:#1e3a5f;color:white;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tt-back{color:#93c5fd;text-decoration:none;font-size:12px;white-space:nowrap}
.tt-back:hover{color:white}
.tt-topbar h1{font-size:14px;font-weight:700;color:white;white-space:nowrap}
.tt-topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.tt-auth-status{font-size:11px;color:#93c5fd;white-space:nowrap}
.tt-topbar button{padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:12px;font-weight:600;transition:background .1s}
.tt-topbar button:hover{background:rgba(255,255,255,.22)}
.tt-save-btn {background:#2563eb!important;border-color:#2563eb!important}
.tt-save-btn:hover{background:#1d4ed8!important}
.tt-auto-btn {background:#7c3aed!important;border-color:#7c3aed!important}
.tt-auto-btn:hover{background:#6d28d9!important}
.tt-version-btn{background:#0f766e!important;border-color:#0f766e!important}
.tt-version-btn:hover{background:#0d5f59!important}
.tt-clear-btn{background:rgba(220,38,38,.2)!important;border-color:rgba(252,165,165,.5)!important}
.tt-clear-btn:hover{background:rgba(220,38,38,.35)!important}

/* ── Toolbar ── */
.tt-toolbar{display:flex;align-items:center;gap:8px;padding:5px 14px;background:white;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tt-view-btns{display:flex;gap:0}
.tt-view-btn{padding:4px 12px;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;transition:all .1s}
.tt-view-btn:first-child{border-radius:6px 0 0 6px}
.tt-view-btn:last-child{border-radius:0 6px 6px 0}
.tt-view-btn.active{background:#2563eb;color:white;border-color:#2563eb}
.tt-toolbar select{padding:3px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;height:28px}
.tt-schedule-controls{display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;font-size:11px;white-space:nowrap}
.tt-schedule-controls label{color:#374151;font-size:11px}
.tt-schedule-controls input[type="number"]{width:40px;height:24px;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;text-align:center}
.tt-schedule-controls button{height:24px;padding:2px 7px;border:1px solid #2563eb;border-radius:4px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:11px;font-weight:600}
.tt-conflict-bar{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tt-conflict-bar-ok{background:#dcfce7;color:#166534}
.tt-conflict-bar-warn{background:#fef3c7;color:#92400e}
.tt-toolbar-right{display:flex;gap:6px;margin-left:auto;align-items:center}

/* ── Layout: grid only ── */
.tt-body{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column;min-height:0}
#ttGrid{flex:1;overflow:auto;min-height:0;width:100%}


/* ── Entry card: 2행 레이아웃 ── */
.tt-entry-card{border-radius:2px;padding:0 2px;border-left-width:3px;min-width:0;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;justify-content:center;width:100%;height:100%;box-sizing:border-box;gap:0}
.tt-entry-card[data-multi]{border-right-width:3px!important}
.tt-entry-row1{display:flex;align-items:center;gap:1px;overflow:hidden;line-height:1.15}
.tt-entry-title{flex:1;min-width:0;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:clamp(7px,0.65vw,9px)}
.tt-entry-multi-cnt{flex-shrink:0;font-size:7px;font-weight:700;background:rgba(0,0,0,.15);border-radius:2px;padding:0 2px;line-height:1.3}
.tt-entry-row2{display:flex;align-items:center;justify-content:space-between;gap:1px;overflow:hidden;line-height:1.1}
.tt-entry-teacher2{flex:1;min-width:0;font-size:clamp(6px,0.52vw,7px);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-entry-pin2{flex-shrink:0;font-size:7px;line-height:1}
.tt-entry-pinned{outline:1.5px solid #f59e0b!important}
.tt-entry-conflict{outline:1.5px solid #ef4444}
.tt-entry-card.tt-dragging{opacity:.4;outline:2px dashed #2563eb}

/* ── All-classes table ── */
.tt-all-class-table{border-collapse:collapse;width:100%;table-layout:fixed}
/* 반 헤더 열 */
.tt-all-corner{background:#1e3a5f;color:white;text-align:center;padding:1px;position:sticky;left:0;z-index:3;font-size:8px;width:26px!important;min-width:26px!important}
.tt-all-row-hdr{text-align:center;border-right:2px solid #94a3b8;white-space:nowrap;position:sticky;left:0;z-index:2;padding:0;width:26px!important;min-width:26px!important;overflow:hidden}
.tt-all-row-hdr b{display:block;font-size:clamp(8px,0.75vw,10px);font-weight:800;line-height:1.2}
.tt-all-row-hdr span{font-size:clamp(6px,0.6vw,8px);font-weight:600;line-height:1}
/* 행 높이 */
.tt-all-class-table tbody tr{height:calc((100vh - 44px - 34px - 220px - 48px) / var(--num-rows, 12));min-height:22px}
.tt-all-grade-boundary>td{border-top:2px solid #3b82f6}
/* 요일 헤더 */
.tt-day-header{font-weight:700;color:white;background:#1e3a5f;text-align:center;font-size:clamp(8px,0.75vw,11px);padding:2px;border-right:2px solid #475569!important}
/* 교시 서브헤더 */
.tt-period-sub-hdr{background:#f1f5f9;text-align:center;border-bottom:1px solid #e2e8f0;font-size:clamp(6px,0.55vw,8px);padding:1px 0;white-space:nowrap;overflow:hidden}
.tt-period-sub-hdr.day-start{border-left:2px solid #94a3b8!important}
/* 셀 */
.tt-cell,.tt-all-cell{border:1px solid #e8edf3;vertical-align:top;padding:0 1px;overflow:hidden}
.tt-all-cell.day-start{border-left:2px solid #94a3b8!important}
.tt-cell.tt-dragover,.tt-all-cell.tt-dragover{background:#dbeafe;outline:1.5px dashed #2563eb}
.tt-cell-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:clamp(8px,0.7vw,10px);pointer-events:none}
.tt-cell-ph::before{content:"+"}

.tt-corner-label{font-size:10px;font-weight:700;color:white}
.tt-day-header{background:#1e3a5f;color:white;text-align:center;padding:6px 2px;font-size:13px;font-weight:700;border:1px solid #2d4f7c;border-right:3px solid #1e3a5f;width:calc((100% - 46px)/5)}
/* Day column alternating tint — applied via JS data-day attribute */
.tt-cell[data-day="0"]{background:#ffffff}
.tt-cell[data-day="1"]{background:#f8faff}
.tt-cell[data-day="2"]{background:#ffffff}
.tt-cell[data-day="3"]{background:#f8faff}
.tt-cell[data-day="4"]{background:#ffffff}
.tt-cell[data-day="0"].tt-dragover,.tt-cell[data-day="1"].tt-dragover,.tt-cell[data-day="2"].tt-dragover,.tt-cell[data-day="3"].tt-dragover,.tt-cell[data-day="4"].tt-dragover{background:#dbeafe}
/* Period label row height */
.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:3px;width:46px}

.tt-period-label{background:#f8fafc;border:1px solid #e2e8f0;text-align:center;vertical-align:middle;padding:2px;width:46px}
.tt-period-label input{width:100%;border:none;background:transparent;text-align:center;font-size:9px;font-weight:700;color:#374151;padding:1px}
.tt-cell{border:1px solid #e2e8f0;vertical-align:top;padding:3px;position:relative;min-height:52px}
.tt-cell.tt-dragover{background:#dbeafe;outline:2px dashed #2563eb}
.tt-cell-ph{min-height:40px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:16px;pointer-events:none}
.tt-cell-ph::before{content:"+"}

/* ── Single-row card grid: all cards in one row, auto-shrink ── */
.tt-cell-card-grid{display:flex;flex-direction:row;flex-wrap:nowrap;gap:2px;width:100%;overflow:hidden}
.tt-cell-card-grid .tt-entry-card{flex:1;min-width:0;overflow:hidden}

/* ── Entry card — 2-row layout ── */
.tt-entry-card{border:1px solid rgba(0,0,0,.12);border-radius:4px;padding:3px 5px;position:relative;font-size:10px;border-left-width:4px;min-width:0;overflow:hidden;cursor:pointer}
.tt-entry-card.tt-entry-conflict{outline:2px solid #ef4444;animation:tt-pulse .8s ease-in-out infinite alternate}
@keyframes tt-pulse{from{outline-color:#ef4444}to{outline-color:#fca5a5}}
.tt-entry-row1{display:flex;align-items:flex-start;gap:2px;min-height:16px}
.tt-entry-title{flex:1;min-width:0;font-weight:700;font-size:11px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
.tt-entry-pin{flex-shrink:0;width:14px;height:14px;border:none;background:transparent;cursor:pointer;font-size:10px;padding:0;opacity:.35;transition:opacity .1s;line-height:1}
.tt-entry-pin:hover{opacity:1}
.tt-entry-pinned .tt-entry-pin{opacity:1}
.tt-entry-pinned{outline:2px solid #f59e0b!important;outline-offset:-1px}
.tt-entry-row2{display:flex;align-items:center;justify-content:space-between;gap:3px;min-height:13px;margin-top:2px}
.tt-entry-teacher{flex:1;min-width:0;font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-entry-grade-chips{display:flex;gap:2px;flex-shrink:0}
.tt-entry-grade{display:inline-block;font-size:8px;font-weight:700;padding:0 4px;border-radius:3px;white-space:nowrap;line-height:14px}
.tt-entry-card.tt-dragging{opacity:.45;outline:2px dashed #2563eb}

/* ── Bottom panel (resizable, tabs: 과목카드 / 교사조건 / 교실관리) ── */
.tt-bottom{flex-shrink:0;display:flex;flex-direction:column;background:white;height:260px;min-height:0;overflow:hidden;border-top:1px solid #e2e8f0}
.tt-bottom-collapsed{height:0!important}
.tt-bottom-resizer{height:8px;cursor:row-resize;background:#f1f5f9;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;touch-action:none;position:relative;z-index:5}
.tt-bottom-resizer::after{content:"⋯";font-size:11px;color:#9ca3af;letter-spacing:3px}
.tt-bottom-resizer:hover{background:#eff6ff}
.tt-bottom-resizer:hover::after{color:#2563eb}
.tt-bottom-scroll{flex:1;overflow-y:auto}
.tt-bottom-tab{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;position:sticky;top:0;z-index:2;flex-shrink:0}
.tt-bottom-tab-btn{padding:6px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tt-bottom-tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}
.tt-bottom-content{padding:8px 10px}

/* ── Subject panel in bottom bar ── */
.tt-sc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tt-sc-grade-sel{padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:11px}
.tt-sc-cards{display:flex;flex-direction:row;flex-wrap:wrap;gap:4px}
.tt-subject-card{border-left:3px solid #2563eb;border-radius:5px;padding:4px 7px;cursor:grab;user-select:none;border:1px solid #e2e8f0;border-left-width:3px;min-width:110px;max-width:180px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px}
.tt-subject-card:hover{box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tt-subject-card.tt-dragging{opacity:.4}
.tt-sc-name{font-size:11px;font-weight:700;line-height:1.3;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-sc-row1{display:flex;align-items:baseline;gap:4px;min-height:16px}
.tt-sc-row2{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-top:1px;min-height:13px}
.tt-sc-teacher{flex:1;min-width:0;font-size:9px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-sc-grade-chips{display:flex;gap:2px;flex-shrink:0;flex-wrap:nowrap}
.tt-sc-badge{flex-shrink:0;font-size:9px;font-weight:700;padding:0 4px;border-radius:3px;line-height:14px}
.tt-sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.tt-sc-name{font-size:11px;font-weight:600;line-height:1.3;flex:1}
.tt-sc-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap}
.tt-sc-bot{font-size:10px;color:#6b7280;margin-top:2px;display:flex;justify-content:space-between}
.tt-sc-sec{background:#ede9fe;color:#5b21b6;padding:1px 4px;border-radius:999px;font-size:9px;font-weight:700}
.tt-subject-done{opacity:.5;cursor:default}
.tt-panel-section-title{margin:0 0 4px;padding:2px 5px;border-radius:4px;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;display:inline-block}
.tt-panel-section-done{background:#f1f5f9!important;color:#64748b!important}

/* ── Constraints table ── */
.tt-constraint-table{width:100%;border-collapse:collapse;font-size:12px}
.tt-constraint-table th{background:#f8fafc;padding:5px 10px;border:1px solid #e2e8f0;font-weight:600;text-align:left;white-space:nowrap}
.tt-constraint-table td{padding:4px 10px;border:1px solid #f1f5f9;vertical-align:middle}
.tt-constraint-table input[type="number"]{width:52px;padding:3px;border:1px solid #d1d5db;border-radius:4px;text-align:center}
.tt-con-name{font-weight:600;color:#1e3a5f;white-space:nowrap}
.tt-con-hint{font-size:11px;color:#6b7280;margin-bottom:8px;padding:4px 6px;background:#f8fafc;border-radius:4px}
.tt-constraint-table tr:hover td{background:#f8fafc}

/* ── Rooms table ── */
.rooms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rooms-header h3{font-size:12px;font-weight:700;color:#1e3a5f}
.rooms-table{width:100%;border-collapse:collapse;font-size:11px}
.rooms-table th{background:#f8fafc;padding:4px 6px;border:1px solid #e2e8f0;font-weight:600;white-space:nowrap}
.rooms-table td{padding:3px 6px;border:1px solid #f1f5f9}
.rooms-table input,.rooms-table select{width:100%;padding:2px 4px;border:1px solid #d1d5db;border-radius:3px;font-size:10px}
.rooms-table input[type="number"]{width:52px}
.rooms-table tr:hover td{background:#f8fafc}
.col-del{width:30px;text-align:center}
.stu-del-btn{width:20px;height:20px;border:none;background:#fee2e2;color:#dc2626;border-radius:3px;cursor:pointer;font-size:13px;line-height:1}
.stu-del-btn:hover{background:#fecaca}
.tt-empty{padding:12px;text-align:center;color:#9ca3af;font-size:12px}
.hidden{display:none!important}
.primary-btn{padding:4px 10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer;font-size:12px;font-weight:600}
.primary-btn:hover{background:#1d4ed8}
.primary-btn:disabled{opacity:.4;cursor:default}
.compact-btn{padding:3px 8px;font-size:11px}
/* ── Bottom toggle button ── */
.tt-bottom-toggle-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid #d1d5db;border-radius:6px;background:#f8fafc;color:#374151;cursor:pointer;font-size:12px;font-weight:600;transition:all .1s}
.tt-bottom-toggle-btn:hover{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
.tt-bottom-toggle-btn.active{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
#ttToggleIcon{font-size:14px;line-height:1;transition:transform .2s}
.tt-bottom-toggle-btn.active #ttToggleIcon{transform:rotate(180deg)}
.tt-entry-card{border-radius:3px;padding:1px 4px;font-size:9px;border-left-width:3px;min-width:0;overflow:hidden;cursor:pointer;display:flex;align-items:center;gap:2px;height:100%;min-height:18px;box-sizing:border-box}
.tt-entry-card[data-multi]{border-right-width:3px!important}
.tt-entry-title{flex:1;min-width:0;font-weight:700;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tt-entry-pinned{outline:1.5px solid #f59e0b!important}
.tt-entry-conflict{outline:1.5px solid #ef4444}
.tt-entry-card.tt-dragging{opacity:.45;outline:2px dashed #2563eb}
/* ── Grid: compact for 1920x1080 ── */
.tt-cell{padding:1px;min-width:52px;height:26px;vertical-align:top}
.tt-cell.tt-dragover{background:#dbeafe;outline:1.5px dashed #2563eb}
.tt-cell-ph{width:100%;height:100%;min-height:22px;display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-size:10px}
.tt-cell-ph::after{content:"+"}
.tt-period-label{font-size:8px;font-weight:700;color:#6b7280;padding:2px;text-align:center;background:#f8fafc;width:24px}
.tt-period-label input{width:20px;font-size:8px;border:none;background:transparent;text-align:center;padding:0;color:#6b7280}
.tt-day-header{font-size:10px;font-weight:700;color:white;background:#1e3a5f;padding:2px 4px;text-align:center}
/* ── All-classes compact ── */
.tt-all-class-table{table-layout:auto;min-width:max-content;border-collapse:collapse}
.tt-all-corner{background:#1e3a5f;color:white;font-size:9px;font-weight:700;text-align:center;padding:2px 4px;min-width:36px;white-space:nowrap;position:sticky;left:0;z-index:3}
.tt-all-row-hdr{min-width:36px;max-width:44px;text-align:center;padding:1px 3px;font-size:9px;border-right:2px solid #cbd5e1;white-space:nowrap;position:sticky;left:0;z-index:2}
.tt-all-row-hdr b{display:block;font-size:10px;font-weight:800}
.tt-all-row-hdr span{font-size:8px;font-weight:600}
.tt-all-cell{min-width:52px;max-width:80px;vertical-align:top;padding:1px;height:26px}
.tt-all-grade-boundary>td{border-top:2px solid #93c5fd}
.tt-period-sub-hdr{background:#f8fafc;padding:1px;text-align:center;font-size:8px;color:#64748b;border-bottom:1px solid #e2e8f0;min-width:52px;white-space:nowrap}
.tt-section-sub-hdr{font-size:8px;font-weight:600;color:#6b7280;padding:1px 3px;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-align:center;white-space:nowrap}
/* Day column right border separators */
.tt-cell[data-day="0"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="1"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="2"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="3"]{border-right:2px solid #c7d2e0}
.tt-cell[data-day="4"]{border-right:1px solid #e2e8f0}
/* ── All-classes grid (aScTimetables style) ── */
.tt-all-class-table{table-layout:auto;min-width:max-content;border-collapse:collapse}
.tt-all-corner{background:#1e3a5f;color:white;font-size:11px;font-weight:700;text-align:center;padding:4px 8px;min-width:44px;white-space:nowrap;border-bottom:2px solid #1e3a5f;border-right:2px solid #475569;position:sticky;left:0;z-index:3}
.tt-all-row-hdr{min-width:44px;max-width:52px;text-align:center;padding:2px 4px;font-size:11px;border-right:2px solid #cbd5e1;white-space:nowrap;position:sticky;left:0;z-index:2;cursor:default}
.tt-all-row-hdr b{display:block;font-size:12px;font-weight:800}
.tt-all-row-hdr span{font-size:10px;font-weight:600}
.tt-all-cell{min-width:62px;max-width:92px;vertical-align:top;padding:1px;height:52px}
.tt-all-grade-boundary>td{border-top:2px solid #93c5fd}
.tt-period-sub-hdr{background:#f1f5f9;padding:2px 1px;text-align:center;font-size:9px;color:#64748b;border-bottom:1px solid #e2e8f0;min-width:62px;white-space:nowrap}
.tt-section-sub-hdr{font-size:10px;font-weight:600;color:#6b7280;padding:2px 4px;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-align:center;white-space:nowrap}


/* ────────────────────────────────────────────────────────────────
   Priority 5 · Timetable UI final polish

}

}

}

}

  gap: 4px !important;
}

  max-width: 190px !important;

}
.tt-log-table th,
.tt-log-table td,

/* ── Local/Online mode switch ───────────────────────── */
.tt-mode-switch{display:inline-flex;align-items:center;gap:2px;padding:2px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.10)}
.tt-topbar .tt-mode-btn{padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.16);color:#dbeafe;border:1px solid transparent;white-space:nowrap;font-size:11px;font-weight:800}

.tt-topbar .tt-mode-btn.mode-active{background:#fef3c7;color:#92400e;border-color:#fde68a}
.tt-topbar .tt-mode-btn.mode-online-active{background:#dcfce7;color:#166534;border-color:#86efac}


/* ── Responsive timetable topbar ───────────────────────── */
.tt-topbar{
  height:auto!important;
  min-height:44px!important;
  flex-wrap:wrap!important;
  align-items:center!important;
  gap:6px 10px!important;
  padding:6px 14px!important;
}

.tt-topbar-right{
  min-width:0!important;
  flex:1 1 auto!important;
  flex-wrap:wrap!important;
  justify-content:flex-end!important;
  gap:6px!important;
}
.tt-topbar-right > *{flex:0 0 auto}
.tt-topbar button,.tt-topbar .tt-mode-btn{white-space:nowrap!important;writing-mode:horizontal-tb!important;text-orientation:mixed!important}

.local-dev-menu{position:relative;display:inline-flex;align-items:center;flex:0 0 auto}
.tt-local-dev-menu>summary,
.local-dev-menu>summary{list-style:none;cursor:pointer;user-select:none;font-weight:900;font-size:11px;line-height:1.1;padding:6px 10px;border-radius:999px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;white-space:nowrap}

.usage-meter-head{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:#334155}.usage-meter-head strong{font-weight:900;color:#0f172a}

/* ── Tab switching ── */
document.querySelectorAll(".tt-bottom-tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tt-bottom-tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const t = btn.dataset.tab;
    document.getElementById("ttSubjectsContent")?.classList.toggle("hidden", t !== "subjects");
    document.getElementById("ttConstraintsContent")?.classList.toggle("hidden", t !== "constraints");
    document.getElementById("ttTeacherCardsContent")?.classList.toggle("hidden", t !== "teacherCards");
    document.getElementById("ttRoomsContent")?.classList.toggle("hidden", t !== "rooms");
    document.getElementById("ttLogsContent")?.classList.toggle("hidden", t !== "logs");
  });
});

/* ── Bottom resize & toggle ── */
(function() {
  const bottom  = document.getElementById("ttBottom");
  const resizer = document.getElementById("ttBottomResizer");
  const DEFAULT_H = 260;
  const MIN_H = 80;
  const MAX_H = 720;

  function clampHeight(value) {
    const n = Number.parseInt(value, 10);
    return Math.max(MIN_H, Math.min(MAX_H, Number.isFinite(n) ? n : DEFAULT_H));
  }

  function applyHeight(value, save = false) {
    const next = clampHeight(value);
    bottom.style.height = next + "px";
    bottom.style.setProperty("--tt-bottom-current-height", next + "px");
    document.documentElement.style.setProperty("--tt-bottom-current-height", next + "px");
    if (save) localStorage.setItem("tt_botH", String(next));
    return next;
  }

  let h = applyHeight(localStorage.getItem("tt_botH") || DEFAULT_H, true);

  let resizeActive = false;
  function startResize(clientY, pointerId = null) {
    if (resizeActive) return;
    resizeActive = true;
    document.body.classList.add("tt-resizing-bottom");
    const startY = clientY;
    const startH = bottom.offsetHeight;

    const move = ev => {
      const y = ev.clientY ?? ev.touches?.[0]?.clientY ?? startY;
      const delta = startY - y;
      h = applyHeight(startH + delta, false);
    };
    const end = () => {
      applyHeight(h, true);
      resizeActive = false;
      document.body.classList.remove("tt-resizing-bottom");
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", end);
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", end);
      document.removeEventListener("touchmove", move);
      document.removeEventListener("touchend", end);
      try { if (pointerId != null) resizer.releasePointerCapture?.(pointerId); } catch (_) {}
    };
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", end);
    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", end);
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("touchend", end);
  }

  resizer.addEventListener("mousedown", e => {
    e.preventDefault();
    startResize(e.clientY);
  });
  resizer.addEventListener("pointerdown", e => {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    e.preventDefault();
    try { resizer.setPointerCapture?.(e.pointerId); } catch (_) {}
    startResize(e.clientY, e.pointerId);
  });
  resizer.addEventListener("touchstart", e => {
    const t = e.touches?.[0];
    if (!t) return;
    e.preventDefault();
    startResize(t.clientY);
  }, { passive: false });

  resizer.addEventListener("dblclick", () => {
    h = applyHeight(DEFAULT_H, true);
    document.querySelector(".tt-body")?.scrollIntoView({ block: "start", behavior: "smooth" });
  });

  window._ttSetBottomHeight = applyHeight;
})();

/* ── Bottom bar toggle (synced with resizer h variable via shared ref) ── */
window._ttBottomToggle = (function() {
  const bottom = document.getElementById("ttBottom");
  const btn    = document.getElementById("ttToggleBottom");
  let collapsed = false;

  function getH() { return parseInt(localStorage.getItem("tt_botH") || "260", 10); }

  function show() {
    collapsed = false;
    window._ttSetBottomHeight?.(getH(), false);
    bottom.style.overflow = "";
    btn?.classList.remove("active");
  }
  function hide() {
    collapsed = true;
    bottom.style.height = "0";
    bottom.style.overflow = "hidden";
    btn?.classList.add("active");
  }

  btn?.addEventListener("click", () => { collapsed ? show() : hide(); });
  return { show, hide, isCollapsed: () => collapsed };
})();


/* ── Bottom panel wheel scroll fix ── */
(function() {
  const bottom = document.getElementById("ttBottom");
  if (!bottom || bottom.dataset.wheelScrollFixedR4 === "1") return;
  bottom.dataset.wheelScrollFixedR4 = "1";

  const toPixels = (ev, baseEl) => {
    if (ev.deltaMode === 1) return ev.deltaY * 32;
    if (ev.deltaMode === 2) return ev.deltaY * Math.max(1, baseEl?.clientHeight || window.innerHeight || 600);
    return ev.deltaY;
  };

  const isHidden = el => !el || el.classList?.contains("hidden") || el.hidden;
  const isActuallyVisible = el => !!el && !isHidden(el) && !!(el.offsetWidth || el.offsetHeight || el.getClientRects?.().length);
  const maxScrollTop = el => Math.max(0, (el?.scrollHeight || 0) - (el?.clientHeight || 0));
  const canScrollY = (el, dy) => {
    const max = maxScrollTop(el);
    if (!el || max <= 1) return false;
    if (dy > 0) return el.scrollTop < max - 1;
    if (dy < 0) return el.scrollTop > 1;
    return false;
  };

  function findBestScroller(target, dy) {
    let el = target instanceof Element ? target : null;
    while (el && el !== document.body && el !== document.documentElement) {
      if (!bottom.contains(el)) break;
      const style = window.getComputedStyle(el);
      const overflowY = style.overflowY || style.overflow || "";
      if (/(auto|scroll|overlay)/.test(overflowY) && canScrollY(el, dy)) return el;
      el = el.parentElement;
    }

    const activeTab = [...bottom.querySelectorAll(".tt-bottom-content > div")]
      .find(el => !el.classList.contains("hidden") && isActuallyVisible(el));
    const candidates = [
      activeTab,
      activeTab?.querySelector(".tt-log-list, .tt-log-table-wrap, .room-status-scroll, .room-editor-list, .tt-subject-card-dialog-body, .tt-subject-editor-card-list"),
      bottom.querySelector(".tt-bottom-content"),
      bottom.querySelector(".tt-bottom-scroll"),
    ].filter(Boolean);

    return candidates.find(el => canScrollY(el, dy)) || bottom.querySelector(".tt-bottom-scroll");
  }

  function scrollByWheel(scroller, dy) {
    if (!scroller) return false;
    const before = scroller.scrollTop;
    const max = maxScrollTop(scroller);
    scroller.scrollTop = Math.max(0, Math.min(max, before + dy));
    return scroller.scrollTop !== before;
  }

  document.addEventListener("wheel", ev => {
    if (ev.ctrlKey) return;
    if (!(ev.target instanceof Element) || !bottom.contains(ev.target)) return;
    const dy = toPixels(ev, bottom);
    if (!dy) return;
    const scroller = findBestScroller(ev.target, dy);
    if (scrollByWheel(scroller, dy)) {
      ev.preventDefault();
      ev.stopPropagation();
    }
  }, { passive: false, capture: true });
})();

  document.getElementById("ttPeriodApplyBtn")?.addEventListener("click", () => {

})();

/* ── Saved timetable versions ─────────────────────────────── */
.tt-version-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:10020;display:flex;align-items:center;justify-content:center;padding:24px}
.tt-version-modal{width:min(980px,94vw);max-height:min(760px,92vh);background:white;border-radius:14px;box-shadow:0 24px 70px rgba(15,23,42,.32);display:flex;flex-direction:column;overflow:hidden}
.tt-version-head{display:flex;justify-content:space-between;gap:16px;padding:18px 22px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.tt-version-kicker{display:inline-flex;align-items:center;border-radius:999px;background:#ccfbf1;color:#0f766e;font-size:11px;font-weight:800;padding:3px 10px;margin-bottom:8px}
.tt-version-head h3{font-size:18px;margin:0 0 4px;color:#0f172a}
.tt-version-head p{font-size:12px;color:#64748b;margin:0}
.tt-version-close{width:32px;height:32px;border:1px solid #cbd5e1;border-radius:999px;background:white;color:#0f172a;font-size:18px;cursor:pointer}
.tt-version-body{padding:16px 22px;overflow:auto;display:grid;gap:14px}
.tt-version-savebox{display:grid;grid-template-columns:1fr auto;gap:10px;border:1px solid #dbeafe;background:#eff6ff;border-radius:12px;padding:12px}
.tt-version-savebox input{height:34px;border:1px solid #bfdbfe;border-radius:8px;padding:0 10px;font-size:13px}
.tt-version-savebox button,.tt-version-row button,.tt-version-actions button{height:34px;border:1px solid #0f766e;background:#0f766e;color:white;border-radius:8px;padding:0 12px;font-size:12px;font-weight:800;cursor:pointer}
.tt-version-actions{display:flex;gap:8px;flex-wrap:wrap}
.tt-version-actions button.secondary,.tt-version-row button.secondary{background:white;color:#334155;border-color:#cbd5e1}
.tt-version-actions button.danger,.tt-version-row button.danger{background:white;color:#dc2626;border-color:#fecaca}
.tt-version-summary{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:#334155}
.tt-version-summary span{border:1px solid #e2e8f0;background:#f8fafc;border-radius:999px;padding:5px 10px}
.tt-version-list{display:grid;gap:8px}
.tt-version-row{border:1px solid #e2e8f0;border-radius:12px;background:white;padding:12px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.tt-version-row-title{font-weight:900;color:#0f172a;margin-bottom:4px}
.tt-version-row-meta{display:flex;gap:8px;flex-wrap:wrap;color:#64748b;font-size:11px}
.tt-version-row-meta span{background:#f1f5f9;border-radius:999px;padding:3px 8px}
.tt-version-row-buttons{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tt-version-empty{padding:26px;text-align:center;border:1px dashed #cbd5e1;border-radius:12px;color:#64748b;background:#f8fafc}
.tt-version-compare{border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;padding:12px;font-size:12px;color:#334155;line-height:1.6}
.tt-version-compare h4{margin:0 0 6px;color:#0f172a;font-size:13px}
@media (max-width:760px){.tt-version-savebox,.tt-version-row{grid-template-columns:1fr}.tt-version-row-buttons{justify-content:flex-start}}
