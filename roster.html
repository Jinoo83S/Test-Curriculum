<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIS 명단</title>
  <link id="his-main-css" rel="stylesheet" href="style.css" />
  <script>
    window.HIS_APP_VERSION = "2026-06-22-cache-hard-r90";
    (function() {
      var link = document.getElementById("his-main-css");
      if (link) link.href = "style.css?v=" + encodeURIComponent(window.HIS_APP_VERSION);
    })();
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body data-section="roster" data-initial-view="teachers">

<header class="topbar">
  <div class="topbar-left">
    <h1>HIS Curriculum</h1>
    <p class="subtitle">한동글로벌학교</p>
  </div>
  <nav class="topbar-nav" id="topbarMainNav">
    <a href="index.html" data-section="curriculum" class="topbar-nav-btn topbar-nav-link">📋 커리큘럼</a>
<a href="roster.html" data-section="roster" class="topbar-nav-btn topbar-nav-link active">👥 명단</a>
<a href="setup.html" data-section="setup" class="topbar-nav-btn topbar-nav-link">⚙️ 세부 구성</a>
<a href="prework.html" data-section="prework" class="topbar-nav-btn topbar-nav-link">🗂 시간표 사전작업</a>
<a href="results.html" data-section="results" class="topbar-nav-btn topbar-nav-link">📊 결과표</a>
    <a href="timetable.html" class="topbar-nav-btn topbar-nav-link">⏰ 시간표</a>
  </nav>
  <div class="topbar-right">
    <div class="top-mode-switch" aria-label="저장 위치 모드 전환">
      <button id="topLocalModeBtn" class="secondary-btn top-mode-btn" type="button">로컬 모드</button>
      <button id="topOnlineModeBtn" class="secondary-btn top-mode-btn" type="button">온라인 모드</button>
    </div>
    <span id="saveStatusEl" class="save-status"></span>
    <span id="authStatus" class="auth-status">로그인 확인 중…</span>
    <button id="loginBtn" class="primary-btn hidden" type="button">Google 로그인</button>
      </div>
</header>
<div id="subNavBar" class="sub-nav-bar">
  <div class="sub-nav-group" data-section="roster">
    <button id="navTeachersBtn" class="sub-nav-btn active" type="button">👩‍🏫 교사</button>
    <button id="navStudentsBtn" class="sub-nav-btn" type="button">👨‍🎓 학생</button>
    <button id="navRoomsBtn" class="sub-nav-btn" type="button">🏫 교실</button>
  </div>
</div>
<main class="page page-no-sidebar">
  <section class="main-panel">
    <div id="loginOverlay" class="login-overlay hidden">
      <div class="login-overlay-box">
        <h2>로그인이 필요합니다</h2>
        <p>Google 로그인 후 HIS 커리큘럼을 읽고 수정할 수 있습니다.</p>
      </div>
    </div>

    <div class="main-view" id="teacherMgmtView">
<div class="full-page-content" id="teacherContent"></div>
</div>

    <div class="main-view hidden" id="roomMgmtView">
      <div class="full-page-content room-page-content" id="roomContent"></div>
    </div>

    <div class="main-view hidden" id="studentMgmtView">
<div class="student-mgmt-layout">
<div class="student-sidebar">
<div class="student-sidebar-header">
<h3>학년 · 반</h3>
<button class="primary-btn compact-btn" id="addClassBtn" type="button">+ 반 추가</button>
</div>
<div class="class-list" id="classList"></div>
</div>
<div class="student-main">
<div class="student-main-empty" id="studentMainEmpty"><p>왼쪽에서 반을 선택하세요</p></div>
<div class="hidden" id="studentMainContent">
<div class="student-main-header">
<div class="student-main-title-wrap">
<input class="class-name-input" id="classNameInput" placeholder="반 이름" type="text"/>
<select class="class-grade-select" id="classGradeSelect">
<option value="7학년">7학년</option><option value="8학년">8학년</option><option value="9학년">9학년</option>
<option value="10학년">10학년</option><option value="11학년">11학년</option><option value="12학년">12학년</option>
</select>
<button class="danger-btn compact-btn" id="deleteClassBtn" type="button">반 삭제</button>
</div>
<div class="student-count-badge">학생 <span id="studentCount">0</span>명</div>
</div>
<div class="paste-area-wrap">
<div class="paste-label">📋 엑셀에서 복사 후 아래 영역에 붙여넣기 <span class="paste-hint">첫 번째 열: 이름</span></div>
<textarea class="excel-paste-area" id="excelPasteArea" placeholder="엑셀 데이터를 여기에 붙여넣으세요 (Ctrl+V)
예) 홍길동	남	2007-03-15"></textarea>
<div class="paste-actions">
<button class="primary-btn" id="parsePasteBtn" type="button">명단 추가</button>
<button class="secondary-btn" id="clearPasteBtn" type="button">지우기</button>
<span class="paste-columns-hint">열 구성: <strong>이름</strong> [성별] [생년월일] [기타]</span>
</div>
</div>
<div class="student-table-wrap">
<table class="student-table">
<thead><tr><th class="col-num">번호</th><th>이름</th><th class="col-gender">성별</th><th class="col-birth">생년월일</th><th class="col-extra">기타</th><th class="col-del">삭제</th></tr></thead>
<tbody id="studentTableBody"></tbody>
</table>
<div class="student-table-empty hidden" id="studentTableEmpty">아직 학생 명단이 없습니다.</div>
</div>
<div class="student-main-footer">
<button class="secondary-btn" id="addStudentRowBtn" type="button">+ 학생 직접 추가</button>
<button class="secondary-btn" id="exportStudentXlsxBtn" type="button">📥 엑셀 내보내기</button>
</div>
</div>
</div>
</div>
</div>
  </section>
</main>
<script type="module">
  import { versioned } from "./js/version.js?v=2026-06-22-cache-hard-r90";
  await import(versioned("./js/app.js"));
</script>
</body>
</html>
