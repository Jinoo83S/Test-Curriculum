<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HIS 시간표 출력 디자이너</title>
<link rel="stylesheet" href="timetable-print.css?v=2026-07-15-print-usability-r365">
<style id="printPageStyle">@page{size:297mm 210mm;margin:5mm}</style>
</head>
<body>
<header class="topbar">
  <a href="timetable.html?release=r370-final-20260720">← 시간표로 돌아가기</a>
  <h1>시간표 출력 디자이너 <span class="badge">r365</span></h1>
  <div class="spacer"></div>
  <span id="authStatus" class="status">로그인 확인 중…</span>
  <button id="saveSettingsBtn" class="save">설정 저장</button>
  <button id="exportSettingsBtn" type="button" title="임시 기능: 현재 출력 디자이너 설정을 JSON으로 백업합니다.">설정 내보내기</button>
  <button id="loginBtn" class="hidden">Google 로그인</button>
  <button id="logoutBtn" class="hidden">로그아웃</button>
  <button id="refreshBtn">미리보기 새로고침</button>
  <button id="excelDbBtn" type="button" title="현재 선택 범위를 학년/이름/과목/영문/교사/교실 데이터베이스 형식으로 저장합니다.">Excel DB 저장</button>
  <button id="printBtn" class="primary">인쇄/PDF</button>
</header>
<div id="renderOverlay" class="render-overlay" aria-live="polite" aria-busy="true"><div class="render-box"><div class="render-spinner"></div><div id="renderOverlayText">미리보기를 다시 그리는 중입니다…</div></div></div>
<main class="app">
  <aside class="sidebar left">
    <section class="panel"><h2>출력 종류</h2><div class="body">
      <div class="field"><span>출력 대상</span><select id="outputKind"><option value="class:individual">학급 - 개별</option><option value="class:overview">학급 - 전체</option><option value="teacher:individual">교사 - 개별</option><option value="teacher:overview">교사 - 전체</option><option value="room:individual">교실 - 개별</option><option value="room:overview">교실 - 전체</option><option value="student:individual">학생 - 개별</option></select></div>
      <div class="field"><span>출력 학기</span><select id="semester"><option value="1">1학기</option><option value="2">2학기</option></select></div>
      <select id="targetType" class="hidden"><option value="class">학급</option><option value="student">학생</option><option value="teacher">교사</option><option value="room">교실</option></select><select id="layoutMode" class="hidden"><option value="individual">개별 출력</option><option value="overview">전체표 출력</option></select>
      <div class="two"><div class="field"><span>형식</span><select id="format"><option value="pdf">PDF</option><option value="word">Word</option></select></div><div class="field"><span>용지</span><select id="paper"><option value="a4-landscape">가로</option><option value="a4-portrait">세로</option></select></div></div>
      
      <div class="field"><span>글꼴</span><select id="fontMode"><option value="system">기본 시스템</option><option value="malgun">맑은 고딕</option><option value="malgun-tight">맑은 고딕 좁게</option><option value="pretty">개별표용 부드러운 글꼴</option><option value="nanum">나눔고딕</option></select></div>
      <div class="note-fields"><div class="field"><span>제목 왼쪽</span><input id="headerLeft" type="text" placeholder="자동: 학년/대상"></div><div class="field"><span>제목 오른쪽</span><input id="headerRight" type="text" placeholder="자동: 날짜"></div></div>
      <div class="field"><span>미리보기 범위</span><select id="previewMode"><option value="sample">샘플 1개만 빠르게 보기</option><option value="selected">선택 대상 전체 미리보기</option></select></div>
      
    </div></section>

    <section class="panel"><h2 class="card-title-row"><span>카드 표시</span><button id="applyCardSettingsBtn" class="primary inline-apply" type="button">카드 설정 적용</button></h2><div class="body">
      <input type="hidden" id="cellLayout" value="auto"><input type="hidden" id="applyMode" value="card"><input type="hidden" id="fontScale" value="normal">
      <label class="check ellipsis-toggle" title="1~4분할 전체에 공통 적용"><input type="checkbox" id="ellipsisMode"><span>긴 과목/영문명은 칸에서 자르기</span></label>
      <div class="split-tabs" role="tablist" aria-label="분할별 카드 설정">
        <button type="button" class="active" data-split-tab="1">1</button><button type="button" data-split-tab="2">2</button><button type="button" data-split-tab="3">3</button><button type="button" data-split-tab="4">4</button>
      </div>
      <div class="split-editor" data-split-panel="1">
        <div class="two"><div class="field"><span>1과목 글자 크기</span><select id="splitFont1"><option value="normal">기본</option><option value="small">작게</option><option value="xsmall">아주 작게</option><option value="large">크게</option><option value="custom">사용자 지정</option></select></div><div class="field"><span>1과목 배치</span><select id="splitLayout1"><option value="standard">위치 설정 사용</option><option value="compact">중앙 압축</option><option value="simple">과목+교실</option><option value="subject">과목만</option></select></div></div>
      </div>
      <div class="split-editor hidden" data-split-panel="2">
        <div class="field"><span>2분할 방향</span><select id="splitDir2"><option value="cols">세로 분할(좌우)</option><option value="rows">가로 분할(위아래)</option></select></div>
        <div class="two"><div class="field"><span>2분할 글자 크기</span><select id="splitFont2"><option value="normal">기본</option><option value="small">작게</option><option value="xsmall">아주 작게</option><option value="large">크게</option><option value="custom">사용자 지정</option></select></div><div class="field"><span>2분할 배치</span><select id="splitLayout2"><option value="standard">위치 설정 사용</option><option value="compact">중앙 압축</option><option value="simple">과목+교실</option><option value="subject">과목만</option></select></div></div>
      </div>
      <div class="split-editor hidden" data-split-panel="3">
        <div class="field"><span>3분할 방향</span><select id="splitDir3"><option value="grid">2×2 분할</option><option value="cols">세로 분할(좌우)</option><option value="rows">가로 분할(위아래)</option></select></div>
        <div class="two"><div class="field"><span>3분할 글자 크기</span><select id="splitFont3"><option value="normal">기본</option><option value="small">작게</option><option value="xsmall">아주 작게</option><option value="large">크게</option><option value="custom">사용자 지정</option></select></div><div class="field"><span>3분할 배치</span><select id="splitLayout3"><option value="standard">위치 설정 사용</option><option value="compact">중앙 압축</option><option value="simple">과목+교실</option><option value="subject">과목만</option></select></div></div>
      </div>
      <div class="split-editor hidden" data-split-panel="4">
        <div class="field"><span>4분할 방향</span><select id="splitDir4"><option value="grid">2×2 분할</option><option value="cols">세로 분할(좌우)</option><option value="rows">가로 분할(위아래)</option></select></div>
        <div class="two"><div class="field"><span>4분할 글자 크기</span><select id="splitFont4"><option value="normal">기본</option><option value="small">작게</option><option value="xsmall">아주 작게</option><option value="large">크게</option><option value="custom">사용자 지정</option></select></div><div class="field"><span>4분할 배치</span><select id="splitLayout4"><option value="standard">위치 설정 사용</option><option value="compact">중앙 압축</option><option value="simple">과목+교실</option><option value="subject">과목만</option></select></div></div>
      </div>
      <div id="fieldRows"></div>
    </div></section>
  </aside>

  <section class="preview-wrap">
    <div class="preview-toolbar"><strong>미리보기</strong><span id="previewMeta" class="meta">데이터 로딩 중…</span><div class="zoom"><span>확대</span><input id="zoom" type="range" min="35" max="250" value="75"><b id="zoomText">75%</b></div></div>
    <div id="previewScroll" class="preview-scroll"><div id="previewInner" class="preview-inner"><div class="preview-page"><div class="disabled-note">데이터를 불러오는 중입니다.</div></div></div></div>
  </section>

  <aside class="sidebar right">
    <section class="panel"><h2>출력 범위</h2><div class="body">
      <div id="scopeOptions" class="scope-options"></div>
      <div class="divider"></div>
      <div id="classChips" class="chips"></div>
      <div class="hint" id="scopeHint">출력 대상에 맞는 범위만 선택합니다.</div>
    </div></section>

    <section class="panel"><h2>간략 출력 과목</h2><div class="body">
      <div id="specialSubjects" class="subject-list"></div>
      
    </div></section>
  </aside>
</main>
<script type="module" src="./js/timetable-print-app.js?v=2026-07-15-print-usability-r365"></script>
</body>
</html>
