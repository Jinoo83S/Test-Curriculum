<body>
<header class="topbar">
  <a href="timetable.html">← 시간표로 돌아가기</a>
  <h1>시간표 PDF 출력 디자이너 <span class="badge">r243</span></h1>
  <div class="spacer"></div>
  <span id="authStatus" class="status">로그인 확인 중…</span>
  <button id="saveSettingsBtn" class="save">설정 저장</button>
  <button id="loginBtn" class="hidden">Google 로그인</button>
  <button id="logoutBtn" class="hidden">로그아웃</button>
  <button id="refreshBtn">미리보기 새로고침</button>
  <button id="printBtn" class="primary">전체 PDF 저장/인쇄</button>
</header>
<main class="app">
  <aside class="sidebar left">
    <section class="panel"><h2>출력 종류</h2><div class="body">
      <div class="field"><span>대상</span><select id="targetType"><option value="class">학급</option><option value="student">개인</option><option value="teacher">교사</option><option value="room">교실</option></select></div>
      <div class="field"><span>출력 방식</span><select id="layoutMode"><option value="individual">개별 출력</option><option value="overview">전체표 출력</option></select></div>
      <div class="two"><div class="field"><span>형식</span><select id="format"><option value="pdf">PDF</option></select></div><div class="field"><span>용지</span><select id="paper"><option value="a4-landscape">A4 가로</option><option value="a4-portrait">A4 세로</option></select></div></div>
      <div class="field"><span>미리보기 범위</span><select id="previewMode"><option value="sample">샘플 1개만 빠르게 보기</option><option value="selected">선택 대상 전체 미리보기</option></select></div>
      <div class="hint">기본은 샘플 1개만 표시합니다. 인쇄는 선택 대상 전체로 진행됩니다.</div>
      
    </div></section>

    <section class="panel"><h2 class="card-title-row"><span>카드 표시</span><button id="applyCardSettingsBtn" class="primary inline-apply" type="button">카드 설정 적용</button></h2><div class="body">
      <input type="hidden" id="cellLayout" value="auto"><input type="hidden" id="applyMode" value="card"><input type="hidden" id="fontScale" value="normal">
      <div class="split-tabs" role="tablist" aria-label="분할별 카드 설정">
        <button type="button" class="active" data-split-tab="1">1</button><button type="button" data-split-tab="2">2</button><button type="button" data-split-tab="3">3</button><button type="button" data-split-tab="4">4</button>
      </div>
      <div class="split-editor" data-split-panel="1">
        <div class="two"><div class="field"><span>1과목 글자 크기</span><select id="splitFont1"><option value="normal">기본</option><option value="small">작게</option><option value="xsmall">아주 작게</option><option value="large">크게</option></select></div><div class="field"><span>1과목 배치</span><select id="splitLayout1"><option value="standard">위치 설정 사용</option><option value="compact">중앙 압축</option><option value="simple">과목+교실</option><option value="subject">과목만</option></select></div></div>
      </div>

function entryMatchesStudent(e, st, cls) { const sid=clean(st.id); const sname=clean(st.name); if ((e.audienceStudentKeys||[]).some(x=>clean(x)===sid || clean(x)===sname)) return true; const cm=cardMap(); const ids=entryCardIds(e); let hasStudentCard=false; for (const id of ids) { const c=cm.get(id); const sk=(c?.studentKeys||[]).map(clean); if (sk.length) { hasStudentCard=true; if (sk.includes(sid) || sk.includes(sname)) return true; } } return !hasStudentCard && entryMatchesClass(e, cls); }
function buildEntities() { const type=targetType(); const visibleEntries=visibleEntriesForScope(); if (type === "class") return classes().filter(classAllowedByScope).map(c=>({type,key:c.key,label:c.label,sub:`${c.gradeNo}학년`, match:e=>entryMatchesClass(e,c)})).filter(ent=>visibleEntries.some(ent.match)); if (type === "student") return students().filter(ent=>visibleEntries.some(ent.match)); if (type === "teacher") { const names=unique(entries().flatMap(entryTeachers)).filter(teacherAllowedByScope).sort((a,b)=>a.localeCompare(b,"ko")); return names.map(n=>({type,key:n,label:n,sub:"교사",match:e=>entryMatchesTeacher(e,{key:n})})).filter(ent=>entries().some(ent.match)); } const rm=rooms().filter(r=>roomAllowedByScope(r.id)); return rm.map(r=>({type,key:r.id,label:r.label,sub:r.type||"교실",room:r,match:e=>entryMatchesRoom(e,r)})).filter(ent=>entries().some(ent.match)); }
function renderEntityList() { entitiesCache = buildEntities(); if ($("scopeHint")) $("scopeHint").textContent = `${entitiesCache.length}개 대상이 출력됩니다.`; }
function selectedEntities() { entitiesCache = buildEntities(); return entitiesCache; }
function fieldSettings() { return collectSettings().fields; }
function itemFromCard(e,c,periodLabel) { return { entry:e, card:c, subject:cardTitle(c,e), english:cardEnglish(c,e), teacher:clean(c?.teacherName || (c?.teachers||[]).join(", ") || e?.teacherName), room:itemRoomForCard(e,c), class:cardClasses(c,e), period:periodLabel, group:clean(c?.group), track:clean(c?.track), rawSubject:clean(c?.subject), rawLabel:clean(c?.label) }; }
function itemFromEntry(e,periodLabel) { return { entry:e, card:null, subject:clean(e.groupName || e.subject || "수업"), english:"", teacher:clean(e.teacherName), room:entryRoomNames(e), class:(e.audienceClassKeys||[]).map(k=>k.replace(":","")).join(", "), period:periodLabel }; }
function entryItems(e, ent, periodLabel) { const cm=cardMap(); const type=targetType(); let ids=entryCardIds(e); let out=[]; if (ids.length) { for (const id of ids) { const c=cm.get(id); if (!c) continue; if (type === "class") { const keys = cardClassKeys(c); if (keys.length ? keys.includes(ent.key) : entryMatchesClass(e, ent)) out.push(itemFromCard(e,c,periodLabel)); }
      else if (type === "teacher") { const ts=cardTeachers(c); if (ts.length ? ts.includes(ent.key) : splitTeachers(e.teacherName).includes(ent.key)) out.push(itemFromCard(e,c,periodLabel)); }
      else if (type === "room") { const rid = e?.roomAssignmentsByTtCardId?.[c.id] || c.fixedRoomId || e.roomId; if (rid === ent.key || (!rid && entryRoomIds(e).includes(ent.key))) out.push(itemFromCard(e,c,periodLabel)); }
      else if (type === "student") { if (entryMatchesStudent(e, {id:ent.key, name:ent.label}, {key:ent.classKey,label:ent.classLabel})) { const keys = cardClassKeys(c); if (keys.length ? keys.includes(ent.classKey) : true) out.push(itemFromCard(e,c,periodLabel)); } }
    }
  }
  if (!out.length && ent.match(e)) out=[itemFromEntry(e,periodLabel)];
  return out;
}
function fieldHtml(item, f, settings) { const v = clean(item[f.key]); if (!v || settings.enabled === false) return ""; return `<span class="field-item field-${f.key} pos-${esc(settings.pos||f.pos)} ${settings.bold?"bold":""}">${esc(v)}</span>`; }
function subjectEnglishHtml(item, fields) { const subjCfg=fields.subject || {}; const engCfg=fields.english || {}; const subj=clean(item.subject); const eng=clean(item.english); const showSubj = subj && subjCfg.enabled !== false; const showEng = eng && engCfg.enabled !== false; if (!showSubj && !showEng) return ""; const pos = subjCfg.pos || "mc"; const bold = subjCfg.bold ? "bold" : ""; return `<span class="field-item field-subject-group pos-${esc(pos)} ${bold}">${showSubj?`<span class="field-subject">${esc(subj)}</span>`:""}${showEng?`<span class="field-english-inline ${engCfg.bold?"bold":""}">${esc(eng)}</span>`:""}</span>`; }
function standardCardHtml(item, fields) { return subjectEnglishHtml(item, fields) + FIELD_DEFS.filter(f=>f.key!=="subject" && f.key!=="english").map(f=>fieldHtml(item,f,fields[f.key]||{})).join(""); }
function splitStyleFor(count, settings) { const key=String(Math.max(1, Math.min(4, count || 1))); const cfg={...SPLIT_DEFAULTS[key], ...(settings.splitStyles?.[key]||{})}; const font=SPLIT_FONT[cfg.font] || SPLIT_FONT.normal; return { key, cfg, font }; }
function compactCardHtml(item, cfg) { const subj = esc(item.subject); const eng = item.english ? `<div class="compact-sub">${esc(item.english)}</div>` : ""; const meta = [item.teacher,item.room].filter(Boolean).join(" · "); if (cfg.layout === "subject") return `<div class="compact-subject">${subj}</div>`; if (cfg.layout === "simple") return `<div class="compact-subject">${subj}</div>${item.room?`<div class="compact-meta">${esc(item.room)}</div>`:""}`; return `<div class="compact-subject">${subj}</div>${eng}${meta?`<div class="compact-meta">${esc(meta)}</div>`:""}`; }
function normSpecial(v) { return clean(v).toLowerCase().replace(/[\s·⋅・_\-\/()\[\]]+/g, ""); }
function specialMatchValues(item) {
  return unique([
    item.subject, item.english, item.rawSubject, item.rawLabel,
    item.card?.subject, item.card?.subjectEn, item.card?.label, item.card?.nameKo, item.card?.title,
    item.entry?.groupName, item.entry?.subject, item.entry?.subjectEn
  ]).map(normSpecial).filter(Boolean);
}
function hasCAValue(values) { return values.some(v => v === "ca" || v === normSpecial("동아리활동") || v === normSpecial("Club Activity")); }
function hasSAValue(values) { return values.some(v => v === "sa" || v === normSpecial("자율활동") || v === normSpecial("Self-regulated Activity")); }
function specialLabelForItem(item, selected=[]) {
  if (!selected || !selected.length) return "";
  const values = specialMatchValues(item);
  for (const n of selected) {
    const k = normSpecial(n);
    if (!k) continue;
    if (k === "ca") { if (hasCAValue(values)) return "CA"; continue; }
    if (k === "sa") { if (hasSAValue(values)) return "SA"; continue; }
    if (values.includes(k)) return clean(n);
  }
  return "";
}

function miniCardHtml(item, fields, splitCount, settings) { const st=splitStyleFor(splitCount, settings); const splitFields=normalizeFields(fields); const style=`--card-font:${st.font.px}px;--print-card-font:${st.font.print}px`; const layoutClass = `split-${st.key} card-layout-${st.cfg.layout}`; const specialLabel = specialLabelForItem(item, settings.specialSubjects||[]); if (specialLabel) return `<div class="mini-card ${layoutClass} card-layout-subject special-card" style="${style}"><div class="compact-subject">${esc(specialLabel)}</div></div>`; const layout = st.cfg.layout; if (layout !== "standard") return `<div class="mini-card ${layoutClass}" style="${style}">${compactCardHtml(item,{...st.cfg,layout})}</div>`; return `<div class="mini-card ${layoutClass}" style="${style}">${standardCardHtml(item, splitFields)}</div>`; }
function collapseSpecialItems(cellItems, settings) { const out=[]; const seen=new Set(); for (const item of cellItems) { const label=specialLabelForItem(item, settings.specialSubjects||[]); if (!label) { out.push(item); continue; } if (seen.has(label)) continue; seen.add(label); out.push({...item, subject:label, english:"", teacher:"", room:"", __specialLabel:label}); } return out; }
function cellHtml(cellItems) { if (!cellItems.length) return `<div class="empty"></div>`; const settings=collectSettings(); const collapsed=collapseSpecialItems(cellItems, settings); const count = collapsed.length >=5 ? "many" : String(collapsed.length); const splitCount = Math.max(1, Math.min(4, collapsed.length)); const dirs = normalizeSplitDirections(settings.splitDirections); const dir = splitCount >= 2 ? (dirs[String(splitCount)] || "auto") : "auto"; const layout = dir === "auto" ? "" : `layout-${dir}`; const visibleItems = collapsed.slice(0,6); const fieldsForSplit = normalizeSplitFields(settings.splitFields, settings.fields)[String(splitCount)] || settings.fields; return `<div class="lesson-cell count-${count} ${layout}">${visibleItems.map(it=>miniCardHtml(it, fieldsForSplit, splitCount, settings)).join("")}</div>`; }
function tableForEntity(ent) { const labels=periodLabels(); const rows = labels.map((plabel,pidx)=>`<tr><th>${esc(plabel)}</th>${DAYS.map((d,day)=>{ const items=visibleEntriesForScope().filter(e=>e.day===day && e.period===pidx && ent.match(e)).flatMap(e=>entryItems(e,ent,plabel)); return `<td>${cellHtml(items)}</td>`; }).join("")}</tr>`).join(""); return `<table class="tt-table"><thead><tr><th></th>${DAYS.map(d=>`<th>${d}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table>`; }
function paperClass() { return ($("paper")?.value || "a4-landscape") === "a4-portrait" ? "paper-portrait" : "paper-landscape"; }
function pageForEntity(ent) { return `<section class="preview-page ${paperClass()} ${collectSettings().fontScale}"><h3>${esc(ent.label)} 시간표</h3><div class="preview-sub">${esc(ent.sub||"")} · ${new Date().toLocaleDateString("ko-KR")}</div>${tableForEntity(ent)}</section>`; }
function overviewPage(ents) { const labels=periodLabels(); const header = DAYS.map(d=>labels.map(p=>`<th>${esc(d)} ${esc(p)}</th>`).join("")).join(""); const rows = ents.map(ent=>`<tr><th>${esc(ent.label)}</th>${DAYS.map((d,day)=>labels.map((plabel,pidx)=>{ const items=visibleEntriesForScope().filter(e=>e.day===day && e.period===pidx && ent.match(e)).flatMap(e=>entryItems(e,ent,plabel)); return `<td>${cellHtml(items)}</td>`; }).join("")).join("")}</tr>`).join(""); return `<section class="preview-page overview ${paperClass()} ${collectSettings().fontScale}"><h3>${targetType()==="class"?"학급 전체표":targetType()==="student"?"개인 전체표":targetType()==="teacher"?"교사 전체표":"교실 전체표"}</h3><div class="preview-sub">선택 대상 ${ents.length}개</div><table class="tt-table"><thead><tr><th>대상</th>${header}</tr></thead><tbody>${rows}</tbody></table></section>`; }
function renderPagesFor(ents, metaPrefix="") { const pages = layoutMode()==="overview" ? [overviewPage(ents)] : ents.map(pageForEntity); $("previewInner").innerHTML = pages.length ? pages.join("") : `<section class="preview-page"><div class="disabled-note">출력할 대상이 없습니다. 오른쪽 범위를 확인해 주세요.</div></section>`; $("previewMeta").textContent = `${metaPrefix}${ents.length}개 대상 · ${entries().length}개 배치 · ${cards().length}개 카드`; applyZoom(); }
function renderPreview() { if (!dataReady) return; renderEntityList(); const allEnts = selectedEntities(); const mode = $("previewMode")?.value || "sample"; const previewEnts = mode === "sample" ? allEnts.slice(0,1) : allEnts; const prefix = mode === "sample" && allEnts.length > 1 ? `샘플 ${previewEnts.length}/${allEnts.length} · ` : ""; renderPagesFor(previewEnts, prefix); }
function scheduleRender() { clearTimeout(renderTimer); renderTimer=setTimeout(renderPreview, 120); }
function applyZoom() { const z=Number($("zoom").value)||75; $("zoomText").textContent=`${z}%`; $("previewInner").style.transform=`scale(${z/100})`; }
function preset(name) { const s=collectSettings(); Object.keys(s.fields).forEach(k=>{ s.fields[k].enabled=false; s.fields[k].bold=false; }); if (name==="simple") { s.fields.subject={enabled:true,bold:true,pos:"mc"}; s.fields.room={enabled:true,bold:false,pos:"bc"}; s.cellLayout="auto"; s.applyMode="card"; s.fontScale="normal"; s.splitStyles=structuredClone(SPLIT_DEFAULTS); }
  else if (name==="detail") { FIELD_DEFS.forEach(f=>{ s.fields[f.key]={enabled:true,bold:f.key==="subject"||f.key==="room",pos:f.pos}; }); s.fields.class.pos="tl"; s.fields.period.pos="tr"; s.fields.teacher.pos="bl"; s.fields.room.pos="br"; s.fields.english.pos="bc"; s.fontScale="small"; s.splitStyles={"1":{font:"small",layout:"standard"},"2":{font:"small",layout:"compact"},"3":{font:"xsmall",layout:"simple"},"4":{font:"xsmall",layout:"simple"}}; }
  else { s.fields.subject={enabled:true,bold:true,pos:"mc"}; s.fields.english={enabled:true,bold:false,pos:"bc"}; s.fields.teacher={enabled:true,bold:false,pos:"bl"}; s.fields.room={enabled:true,bold:true,pos:"br"}; s.fields.class={enabled:false,bold:false,pos:"tl"}; s.fields.period={enabled:false,bold:false,pos:"tr"}; s.fontScale="normal"; s.splitStyles=structuredClone(SPLIT_DEFAULTS); }
  applySettings(s,true); markCardApplyNeeded(); }
function initialUi() { buildFieldRows(); buildScopeUi(); buildSpecialSubjects(); const last=localStorage.getItem(LAST_KEY); const store=readStore(); const base=last && store[last] ? store[last] : defaultSettings(); applySettings(base,false); setSplitTab(1); renderEntityList(); applySpecialSubjects(base.specialSubjects||[]); }
function setSplitTab(n) { const next=String(n); if (!applying) { if (!splitFieldDraft) splitFieldDraft=normalizeSplitFields(null); splitFieldDraft[String(activeSplitTab||"1")] = readFieldControls(); } activeSplitTab=next; document.querySelectorAll("[data-split-tab]").forEach(btn=>btn.classList.toggle("active", btn.dataset.splitTab===next)); document.querySelectorAll("[data-split-panel]").forEach(panel=>panel.classList.toggle("hidden", panel.dataset.splitPanel!==next)); if (splitFieldDraft) writeFieldControls(splitFieldDraft[next]); }
function wireEvents() { ["targetType","layoutMode","format"].forEach(id=>$(id).addEventListener("change", switchProfile)); document.body.addEventListener("change", e=>{ if (applying) return; if (e.target.matches('input,select')) { if (e.target.id === "paper") applyPaper(e.target.value); if (cardControlChanged(e.target)) { markCardApplyNeeded(); } else { scheduleRender(); } } }); document.body.addEventListener("click", e=>{ const tab=e.target.closest("[data-split-tab]"); if(tab){ setSplitTab(tab.dataset.splitTab); return; } }); $("applyCardSettingsBtn").addEventListener("click",()=>{ markCardApplied(); markDirty("설정 저장 가능"); renderPreview(); }); $("saveSettingsBtn").addEventListener("click",()=>{ saveSettings(); }); $("refreshBtn").addEventListener("click", renderPreview); $("printBtn").addEventListener("click",()=>{ if (!dataReady) return; renderEntityList(); const allEnts = selectedEntities(); renderPagesFor(allEnts, "출력 전체 · "); const restore=()=>{ window.removeEventListener("afterprint", restore); renderPreview(); }; window.addEventListener("afterprint", restore); setTimeout(()=>window.print(), 60); }); $("zoom").addEventListener("input",applyZoom); $("loginBtn").addEventListener("click",login); $("logoutBtn").addEventListener("click",logout); }
function updateAuth(user) { $("authStatus").textContent = user ? (LOCAL_DEV_MODE ? "Local Dev" : (user.email || user.displayName || "로그인됨")) : "로그인 필요"; $("loginBtn").classList.toggle("hidden", !!user || LOCAL_DEV_MODE); $("logoutBtn").classList.toggle("hidden", !user || LOCAL_DEV_MODE); if (user && !subscribed) { subscribed=true; subscribeDomains(["classes","timetable","rooms","rosters"]); } }
function boot() { initialUi(); wireEvents(); setOnUpdate(()=>{ dataReady = initialLoad.classes && initialLoad.timetable && initialLoad.rooms; if (!dataReady) return; buildScopeUi(); buildSpecialSubjects(); const s=getSettings(); applySettings(s,true); applySpecialSubjects(s.specialSubjects||[]); renderPreview(); }); onAuth(updateAuth); }
try { boot(); } catch (err) { console.error(err); const meta=document.getElementById("previewMeta"); if(meta) meta.textContent="초기화 오류: " + (err && err.message ? err.message : String(err)); const box=document.getElementById("previewInner"); if(box) box.innerHTML=`<div class="preview-page"><div class="disabled-note">출력 디자이너 초기화 오류가 발생했습니다.<br>${err && err.message ? err.message : String(err)}</div></div>`; }
</script>
