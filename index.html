<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIS Curriculum</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>HIS Curriculum</h1>
      <p class="subtitle">학년별 커리큘럼 보드</p>
    </div>

    <div class="topbar-right">
      <span id="authStatus" class="auth-status">로그인이 필요합니다</span>
      <button id="loginBtn" class="primary-btn">Google 로그인</button>
      <button id="logoutBtn" class="secondary-btn hidden">로그아웃</button>
      <button id="resetBoardBtn" class="danger-btn">전체 초기화</button>
    </div>
  </header>

  <main class="page">
    <aside class="sidebar">
      <section class="panel">
        <h2>과목 카드</h2>

        <div class="form-grid">
          <input id="templateNameKo" type="text" placeholder="한글 이름" />
          <input id="templateNameEn" type="text" placeholder="영어 이름" />
          <input id="templateTeacher" type="text" placeholder="교사" />
          <select id="templateLanguage">
            <option value="Korean">Korean</option>
            <option value="English">English</option>
            <option value="Both">Both</option>
          </select>
        </div>

        <div class="button-row">
          <button id="templateSubmitBtn" class="primary-btn">카드 추가</button>
          <button id="templateCancelBtn" class="secondary-btn hidden">수정 취소</button>
        </div>

        <div id="templateList" class="template-list"></div>
      </section>

      <section class="panel">
        <h2>범주 옵션 편집</h2>

        <div class="option-box">
          <h3>첫번째 범주</h3>
          <div id="categoryOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="categoryOptionInput" type="text" placeholder="예: 교과" />
            <button id="addCategoryOptionBtn" class="primary-btn">추가</button>
          </div>
        </div>

        <div class="option-box">
          <h3>두번째 범주</h3>
          <div id="trackOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="trackOptionInput" type="text" placeholder="예: 공통" />
            <button id="addTrackOptionBtn" class="primary-btn">추가</button>
          </div>
        </div>

        <div class="option-box">
          <h3>세번째 범주</h3>
          <div id="groupOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="groupOptionInput" type="text" placeholder="예: 영어" />
            <button id="addGroupOptionBtn" class="primary-btn">추가</button>
          </div>
        </div>
      </section>
    </aside>

    <section class="main-panel">
      <div id="loginOverlay" class="login-overlay">
        <div class="login-overlay-box">
          <h2>로그인이 필요합니다</h2>
          <p>Google 로그인 후 공용 커리큘럼을 읽고 수정할 수 있습니다.</p>
        </div>
      </div>

      <div class="board-scroll">
        <div id="gradeBoard" class="grade-board"></div>
      </div>
    </section>
  </main>

</body>
</html>
  <script type="module" src="app.js"></script>
