<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIS Curriculum</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>HIS Curriculum</h1>
      <p class="subtitle">학년별 커리큘럼 보드</p>
    </div>
    <div class="topbar-right">
      <span id="authStatus" class="auth-status">로그인이 필요합니다</span>
      <button id="exportXlsxBtn" class="secondary-btn" type="button">엑셀 내보내기</button>
      <button id="loginBtn" class="primary-btn" type="button">Google 로그인</button>
      <button id="logoutBtn" class="secondary-btn hidden" type="button">로그아웃</button>
      <button id="resetBoardBtn" class="danger-btn" type="button">전체 초기화</button>
    </div>
  </header>

  <main class="page">
    <aside class="sidebar">
      <section class="panel">
        <div class="section-heading-row">
          <h2>과목 카드</h2>
          <div class="sidebar-btn-group">
            <button id="openGroupManagerBtn" class="secondary-btn compact-btn" type="button">그룹 관리</button>
            <button id="openTemplateManagerBtn" class="secondary-btn compact-btn" type="button">표 편집</button>
          </div>
        </div>

        <div class="school-level-bar">
          <select id="sidebarSchoolLevelFilter" class="school-level-select">
            <option value="전체">전체 과목카드</option>
            <option value="중등">📘 중등 (7-9학년)</option>
            <option value="고등">📗 고등 (10-12학년)</option>
          </select>
        </div>
        <div id="templateList" class="template-list"></div>
        <div class="section-gap"></div>

        <div id="commonTemplateFields" class="form-grid">
          <input id="templateNameKo" type="text" placeholder="한글 이름" />
          <input id="templateNameEn" type="text" placeholder="영어 이름" />
          <input id="templateTeacher" type="text" placeholder="교사" />
        </div>

        <label class="semester-mode-toggle">
          <input id="templateSeparateSemesters" type="checkbox" />
          <span>1·2학기 이름/교사가 다를 때 따로 입력</span>
        </label>

        <div id="semesterTemplateFields" class="semester-fields hidden">
          <div class="semester-field-card">
            <div class="semester-field-title">1학기</div>
            <div class="form-grid">
              <input id="templateSem1NameKo" type="text" placeholder="1학기 한글 이름" />
              <input id="templateSem1NameEn" type="text" placeholder="1학기 영어 이름" />
              <input id="templateSem1Teacher" type="text" placeholder="1학기 교사" />
            </div>
          </div>
          <div class="semester-field-card">
            <div class="semester-field-title">2학기</div>
            <div class="form-grid">
              <input id="templateSem2NameKo" type="text" placeholder="2학기 한글 이름" />
              <input id="templateSem2NameEn" type="text" placeholder="2학기 영어 이름" />
              <input id="templateSem2Teacher" type="text" placeholder="2학기 교사" />
            </div>
          </div>
        </div>

        <div class="form-grid-2col form-grid-tight">
          <select id="templateLanguage">
            <option value="Korean">Korean</option>
            <option value="English">English</option>
            <option value="Both">Both</option>
          </select>
          <div class="level-picker" id="templateSchoolLevelPicker">
            <button type="button" class="level-btn" data-level="중등">중등</button>
            <button type="button" class="level-btn active" data-level="공통">공통</button>
            <button type="button" class="level-btn" data-level="고등">고등</button>
          </div>
        </div>

        <div class="button-row">
          <button id="templateSubmitBtn" class="primary-btn" type="button">카드 추가</button>
          <button id="templateCancelBtn" class="secondary-btn hidden" type="button">수정 취소</button>
        </div>
      </section>

      <section class="panel">
        <h2>범주 옵션 편집</h2>
        <div class="option-box">
          <h3>범주</h3>
          <div id="categoryOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="categoryOptionInput" type="text" placeholder="예: 교과" />
            <button id="addCategoryOptionBtn" class="primary-btn" type="button">추가</button>
          </div>
        </div>
        <div class="option-box">
          <h3>구분</h3>
          <div id="trackOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="trackOptionInput" type="text" placeholder="예: 공통" />
            <button id="addTrackOptionBtn" class="primary-btn" type="button">추가</button>
          </div>
        </div>
        <div class="option-box">
          <h3>교과군</h3>
          <div id="groupOptionList" class="option-list"></div>
          <div class="inline-form">
            <input id="groupOptionInput" type="text" placeholder="예: 영어" />
            <button id="addGroupOptionBtn" class="primary-btn" type="button">추가</button>
          </div>
        </div>
      </section>
    </aside>

    <section class="main-panel">
      <div id="loginOverlay" class="login-overlay">
        <div class="login-overlay-box">
          <h2>로그인이 필요합니다</h2>
          <p>Google 로그인 후 HIS 커리큘럼을 읽고 수정할 수 있습니다.</p>
        </div>
      </div>

      <!-- ① 보드 뷰 -->
      <div id="boardView" class="main-view">
        <div class="tab-bar">
          <button id="tab7to9Btn" class="tab-btn active" type="button">7 · 8 · 9</button>
          <button id="tab10to12Btn" class="tab-btn" type="button">10 · 11 · 12</button>
        </div>
        <div class="board-scroll">
          <div id="gradeBoard" class="grade-board"></div>
        </div>
      </div>

      <!-- ② 그룹 관리 뷰 -->
      <div id="groupManagerView" class="main-view hidden">
        <div class="manager-header">
          <div>
            <h2>과목카드 그룹 관리</h2>
            <p class="manager-subtitle">
              사이드바에서 카드를 드래그하여 그룹에 배정하세요.
              그룹명을 클릭하여 수정할 수 있습니다. 변경 즉시 저장됩니다.
            </p>
          </div>
          <div class="manager-actions">
            <button id="groupManagerBackBtn" class="secondary-btn" type="button">커리큘럼으로</button>
            <button id="groupManagerAddGroupBtn" class="primary-btn" type="button">그룹 추가</button>
          </div>
        </div>
        <div id="groupManagerBoard" class="group-manager-board"></div>
      </div>

      <!-- ③ 표 편집 뷰 -->
      <div id="templateManagerView" class="main-view hidden">
        <div class="manager-header">
          <div>
            <h2>과목카드 표 편집</h2>
            <p class="manager-subtitle">과목카드와 계산 그룹을 표 형태로 한 번에 관리합니다. 저장 버튼을 눌러야 반영됩니다.</p>
          </div>
          <div class="manager-actions">
            <span id="templateManagerSaveStatus" class="manager-save-status">저장됨</span>
            <button id="templateManagerBackBtn" class="secondary-btn" type="button">커리큘럼으로</button>
            <button id="templateManagerAddRowBtn" class="secondary-btn" type="button">과목카드 추가</button>
            <button id="templateManagerDiscardBtn" class="secondary-btn" type="button">변경 취소</button>
            <button id="templateManagerSaveBtn" class="primary-btn" type="button">저장</button>
          </div>
        </div>

        <div class="manager-toolbar">
          <input id="templateManagerSearchInput" type="text" placeholder="과목명/교사 검색" />
          <select id="templateManagerLanguageFilter">
            <option value="all">전체 언어</option>
            <option value="Korean">Korean</option>
            <option value="English">English</option>
            <option value="Both">Both</option>
          </select>
          <select id="templateManagerSplitFilter">
            <option value="all">전체 카드</option>
            <option value="split">학기 분리 카드만</option>
            <option value="same">공통 카드만</option>
          </select>
          <select id="templateManagerSortSelect">
            <option value="ko-asc">한글명 ↑</option>
            <option value="ko-desc">한글명 ↓</option>
            <option value="en-asc">영문명 ↑</option>
            <option value="language">언어별</option>
            <option value="group">계산그룹별</option>
          </select>
          <select id="templateManagerLevelFilter">
            <option value="전체">전체 (중+고)</option>
            <option value="중등">📘 중등</option>
            <option value="고등">📗 고등</option>
          </select>
        </div>

        <div class="manager-scroll">
          <section class="manager-section">
            <div class="manager-section-header">
              <h3>과목카드 표 편집</h3>
              <span id="templateManagerCount" class="manager-count"></span>
            </div>
            <div id="templateManagerTableWrap" class="manager-table-wrap"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
