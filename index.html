<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curriculum Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1>Curriculum Board</h1>
      <div class="topbar-buttons">
        <button id="resetBtn" class="danger-btn">전체 초기화</button>
      </div>
    </header>

    <main class="layout">
      <aside class="subject-panel">
        <h2>과목 카드</h2>

        <div class="add-subject-box">
          <input
            type="text"
            id="newSubjectInput"
            placeholder="새 과목명 입력"
          />
          <button id="addSubjectBtn">추가</button>
        </div>

        <div id="cardPool" class="card-pool drop-area" data-area="pool"></div>
      </aside>

      <section class="board-section">
        <div class="board">
          <div class="board-header corner"></div>
          <div class="board-header">1학기</div>
          <div class="board-header">2학기</div>

          <div class="grade-label">7학년</div>
          <div class="drop-cell drop-area" data-cell="7-1"></div>
          <div class="drop-cell drop-area" data-cell="7-2"></div>

          <div class="grade-label">8학년</div>
          <div class="drop-cell drop-area" data-cell="8-1"></div>
          <div class="drop-cell drop-area" data-cell="8-2"></div>

          <div class="grade-label">9학년</div>
          <div class="drop-cell drop-area" data-cell="9-1"></div>
          <div class="drop-cell drop-area" data-cell="9-2"></div>

          <div class="grade-label">10학년</div>
          <div class="drop-cell drop-area" data-cell="10-1"></div>
          <div class="drop-cell drop-area" data-cell="10-2"></div>

          <div class="grade-label">11학년</div>
          <div class="drop-cell drop-area" data-cell="11-1"></div>
          <div class="drop-cell drop-area" data-cell="11-2"></div>

          <div class="grade-label">12학년</div>
          <div class="drop-cell drop-area" data-cell="12-1"></div>
          <div class="drop-cell drop-area" data-cell="12-2"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
